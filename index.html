// ── Utilidades ────────────────────────────────────────────────────
const N=v=>Number(v)||0;
const fmt=n=>`S/ ${N(n).toFixed(2)}`;
// Formatea fecha "2026-03-01" → "01/03/2026"
const fmtD=d=>{
  if(!d)return'—';
  const s=typeof d==='string'?d.substring(0,10):new Date(d).toISOString().substring(0,10);
  const[y,m,dd]=s.split('-');
  return`${dd}/${m}/${y}`;
};
// Fecha hoy como "2026-03-06"
const todayStr=()=>new Date().toISOString().split('T')[0];
// Parsear "dd/mm/yyyy" o "yyyy-mm-dd" a objeto Date seguro
const parseDate=s=>{
  if(!s)return null;
  if(s.includes('/'))return new Date(`${s.split('/')[2]}-${s.split('/')[1]}-${s.split('/')[0]}T12:00:00`);
  return new Date(s+'T12:00:00');
};
// Retorna "yyyy-mm-dd" desde partes
const buildDate=(d,m,y)=>`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

function sumarMeses(fechaISO,m){
  const b=new Date(fechaISO+'T12:00:00');
  let y=b.getFullYear(),mo=b.getMonth()+1,d=b.getDate();
  mo+=m;while(mo>12){mo-=12;y++;}
  const dm=new Date(y,mo,0).getDate();
  return`${y}-${String(mo).padStart(2,'0')}-${String(Math.min(d,dm)).padStart(2,'0')}`;
}
function getFV(base,n,tipo){
  if(tipo==='MENSUAL')return sumarMeses(base,n);
  const d=new Date(base+'T12:00:00');
  tipo==='SEMANAL'?d.setDate(d.getDate()+n*7+1):d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0];
}
// tasa aquí ya viene como decimal (0.06)
function calcInt(monto,tasa,tipo,cuotas){
  const m=N(monto),t=N(tasa),c=N(cuotas)||1;
  if(tipo==='MENSUAL')return m*t;
  if(tipo==='SEMANAL')return(m/c)*t;
  return(m*t)/30;
}

// ── Estado de cuota ───────────────────────────────────────────────
function getEst(r){
  const tp=(r.tipo_pago||'').toUpperCase().trim();
  if(tp==='SOLO INTERES')return'Solo int.';
  if(tp==='PAGO ADELANTADO')return'Adelantado';
  const pagado=N(r.monto_pagado);
  if(!pagado){
    const fv=new Date(r.fecha_vence+'T12:00:00'),hoy=new Date();
    hoy.setHours(0,0,0,0);
    return fv<hoy?'Vencido':'Pendiente';
  }
  return pagado>=N(r.cuota_base)?'Pagado':'Parcial';
}
function getSaldo(r){
  const tp=(r.tipo_pago||'').toUpperCase().trim();
  if(tp==='SOLO INTERES')return N(r.capital_cuota);
  const pagado=N(r.monto_pagado);
  if(!pagado)return N(r.cuota_base);
  return Math.max(0,N(r.cuota_base)-pagado);
}
function getEstPrestamo(cuotas){
  if(!cuotas.length)return'ACTIVO';
  const ests=cuotas.map(getEst);
  const pagadas=ests.filter(e=>e==='Pagado'||e==='Adelantado').length;
  if(pagadas>=cuotas.length)return'CANCELADO';
  if(ests.some(e=>e==='Vencido'))return'VENCIDO';
  if(pagadas>0)return'EN CURSO';
  return'ACTIVO';
}
function genCrono(loan,pid){
  const m=N(loan.monto),t=N(loan.tasa),c=N(loan.cuotas);
  const d=N(loan.desgravamen||0),go=N(loan.gasto_operativo||0);
  const cap=parseFloat((m/c).toFixed(2));
  const int=parseFloat(calcInt(m,t,loan.tipo,c).toFixed(2));
  const base=parseFloat((cap+int+d+go).toFixed(2));
  return Array.from({length:c},(_,i)=>({
    prestamo_id:pid,cliente:loan.cliente,n_cuota:i+1,
    fecha_vence:getFV(loan.fecha_prestamo,i+1,loan.tipo),
    capital_cuota:cap,interes_cuota:int,desgravamen:d,
    cuota_base:base,
    tipo_pago:'NORMAL',monto_pagado:null,mora:null,fecha_pago:null,
  }));
}

// ── Componentes básicos ────────────────────────────────────────────
function Badge({s}){
  const m={'Pendiente':'b-pend','Vencido':'b-venc','Pagado':'b-paid','Parcial':'b-part','Solo int.':'b-solo','Adelantado':'b-adel','ACTIVO':'b-actv','VENCIDO':'b-vencP','EN CURSO':'b-encu','CANCELADO':'b-canc'};

}

// ── Selector de fecha dd/mm/yyyy ───────────────────────────────────
function DatePicker({value,onChange,label}){
  // value es "yyyy-mm-dd"
  const[dd,mm,yy]=value?value.split('-').reverse():[String(new Date().getDate()).padStart(2,'0'),String(new Date().getMonth()+1).padStart(2,'0'),String(new Date().getFullYear())];
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const years=Array.from({length:10},(_,i)=>new Date().getFullYear()-2+i);
  const dias=Array.from({length:31},(_,i)=>String(i+1).padStart(2,'0'));
  function update(field,val){
    const cur=value||todayStr();
    const[cy,cm,cd]=cur.split('-');
    const nd=field==='d'?val:cd,nm=field==='m'?val:cm,ny=field==='y'?val:cy;
    onChange(buildDate(parseInt(nd),parseInt(nm),ny));
  }
  return(
    <div>
      {label&&<span className="lbl">{label}</span>}
      <div className="date-inp">
        <select value={dd} onChange={e=>update('d',e.target.value)}>
          {dias.map(d=><option key={d} value={d}>{d}</option>)}
        </select>
        <select value={mm} onChange={e=>update('m',e.target.value)}>
          {meses.map((m,i)=><option key={i} value={String(i+1).padStart(2,'0')}>{m}</option>)}
        </select>
        <select value={yy} onChange={e=>update('y',e.target.value)}>
          {years.map(y=><option key={y} value={y}>{y}</option>)}
        </select>
      </div>
    </div>
  );
}

// ── Donut Chart ────────────────────────────────────────────────────
function Donut({segs,total,cv,cl}){
  const r=42,cx=55,cy=55,circ=2*Math.PI*r;
  let off=0;
  return(
    <div className="donut-wrap">
      <svg viewBox="0 0 110 110" width="110" height="110" style={{transform:'rotate(-90deg)'}}>
        {segs.map((s,i)=>{
          const pct=total>0?s.v/total:0;
          const p=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.c} strokeWidth="11" strokeDasharray={`${circ*pct} ${circ*(1-pct)}`} strokeDashoffset={-off*circ}/>;
          off+=pct;return p;
        })}
      </svg>
      <div className="donut-center"><div className="donut-cv">{cv}</div><div className="donut-cl">{cl}</div></div>
    </div>
  );
}

/* ══ LOGIN ══════════════════════════════════════════════════════ */
function Login({onLogin}){
  const[mode,setMode]=useState('login');
  const[email,setEmail]=useState('');
  const[pass,setPass]=useState('');
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState('');
  async function submit(){
    setMsg('');setLoading(true);
    const res=await(mode==='login'?db.auth.signInWithPassword({email,password:pass}):db.auth.signUp({email,password:pass}));
    if(res.error)setMsg(res.error.message);
    else if(mode==='register')setMsg('✓ Cuenta creada. Inicia sesión.');
    else onLogin(res.data.user);
    setLoading(false);
  }
  return(
    <div className="login-bg">
      <div className="login-card">
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:46,height:46,border:'1.5px solid var(--gold)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',background:'linear-gradient(135deg,#f9f3e6,#fff)'}}>
            <svg viewBox="0 0 24 24" style={{width:20,height:20,stroke:'var(--gold)',fill:'none',strokeWidth:1.7,strokeLinecap:'round'}}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </div>
          <div style={{fontFamily:"'Fraunces',serif",fontSize:24,fontWeight:700,color:'var(--ink)'}}>Crédito <em style={{color:'var(--teal)',fontStyle:'italic'}}>San Juan</em></div>
          <div style={{fontSize:11.5,color:'var(--grey)',marginTop:4}}>Plataforma de gestión financiera</div>
        </div>
        <div style={{display:'grid',gap:12,marginBottom:14}}>
          <div><span className="lbl">Correo electrónico</span><input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="usuario@correo.com" onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
          <div><span className="lbl">Contraseña</span><input className="inp" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
        </div>
        {msg&&<div style={{fontSize:12.5,padding:'9px 12px',borderRadius:7,marginBottom:12,background:msg.startsWith('✓')?'#dff2e8':'#fde8e8',color:msg.startsWith('✓')?'#1e6e3a':'#b52a2a'}}>{msg}</div>}
        <button className="btn" style={{width:'100%',marginBottom:12,padding:'12px'}} onClick={submit} disabled={loading||!email||!pass}>{loading?'Verificando...':mode==='login'?'Iniciar sesión':'Crear cuenta'}</button>
        <p style={{fontSize:12.5,color:'var(--grey)',textAlign:'center'}}>{mode==='login'?'¿Primera vez? ':'¿Ya tienes cuenta? '}<span style={{color:'var(--teal)',cursor:'pointer',fontWeight:600}} onClick={()=>{setMode(m=>m==='login'?'register':'login');setMsg('');}}>{mode==='login'?'Crear cuenta':'Iniciar sesión'}</span></p>
      </div>
    </div>
  );
}

/* ══ APP ════════════════════════════════════════════════════════ */
function App(){
  const[user,setUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);
  const[view,setView]=useState('dashboard');
  const[loans,setLoans]=useState([]);
  const[sched,setSched]=useState([]);
  const[loading,setLoading]=useState(false);
  const[payingRow,setPayingRow]=useState(null);
  const[viewLoan,setViewLoan]=useState(null);
  const[toast,setToast]=useState(null);
  const[mob,setMob]=useState(false);
  const[dbError,setDbError]=useState(null);// Error visible para debug

  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{setUser(session?.user??null);setAuthLoading(false);});
    const{data:{subscription}}=db.auth.onAuthStateChange((_,s)=>{setUser(s?.user??null);setAuthLoading(false);});
    return()=>subscription.unsubscribe();
  },[]);
  useEffect(()=>{if(user)loadAll();},[user]);

  async function loadAll(){
    setLoading(true);setDbError(null);
    const[lr,sr]=await Promise.all([
      db.from('prestamos').select('*').order('created_at',{ascending:false}),
      db.from('cronograma').select('*').order('n_cuota',{ascending:true}),
    ]);
    if(lr.error){setDbError('Error cargando préstamos: '+lr.error.message);setLoading(false);return;}
    if(sr.error){setDbError('Error cargando cronograma: '+sr.error.message);setLoading(false);return;}
    setLoans(lr.data||[]);
    setSched(sr.data||[]);
    setLoading(false);
  }

  const showToast=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),4500);};

  async function crearPrestamo(data){
    setDbError(null);

    // 1. Guardar préstamo
    const{data:loan,error:e1}=await db.from('prestamos').insert({
      cliente:data.cliente,
      garante:data.garante||'',
      referencia:data.referencia||'',
      cliente_externo:data.clienteExterno,
      monto:N(data.monto),
      tasa:N(data.tasa),
      tipo:data.tipo,
      cuotas:N(data.cuotas),
      desgravamen:N(data.desgravamen||0),
      gasto_operativo:N(data.gastoOperativo||0),
      fecha_prestamo:data.fechaPrestamo,
      creado_por_email:user.email,
    }).select().single();

    if(e1){
      const msg='Error préstamo: '+e1.message;
      setDbError(msg);showToast(msg,'err');
      return false;
    }

    // 2. Insertar cronograma — solo columnas seguras
    const rows=genCrono(data,loan.id).map(r=>({
      prestamo_id:r.prestamo_id,
      cliente:r.cliente,
      n_cuota:r.n_cuota,
      fecha_vence:r.fecha_vence,
      capital_cuota:r.capital_cuota,
      interes_cuota:r.interes_cuota,
      desgravamen:r.desgravamen,
      cuota_base:r.cuota_base,
      tipo_pago:r.tipo_pago,
      monto_pagado:null,
      mora:null,
      fecha_pago:null,
    }));

    const{error:e2}=await db.from('cronograma').insert(rows);
    if(e2){
      const msg='Cronograma error: '+e2.message+' ['+e2.code+']'+(e2.hint?' '+e2.hint:'');
      alert('ERROR: '+msg);
      setDbError(msg);showToast(msg,'err');
    }

    // 3. Recargar TODO desde DB — garantiza que pantalla refleja realidad
    await loadAll();
    showToast('Préstamo guardado — '+N(data.cuotas)+' cuotas');
    return true;
  }

  async function registrarPago(rowId,pago){
    const{error}=await db.from('cronograma').update({
      tipo_pago:pago.tipoPago,
      monto_pagado:N(pago.montoPagado),
      mora:pago.mora?N(pago.mora):null,
      fecha_pago:pago.fechaPago,
    }).eq('id',rowId);
    if(error){showToast('Error: '+error.message,'err');return;}
    setSched(p=>p.map(r=>r.id===rowId?{...r,tipo_pago:pago.tipoPago,monto_pagado:N(pago.montoPagado),mora:pago.mora?N(pago.mora):null,fecha_pago:pago.fechaPago}:r));
    showToast('✓ Pago registrado');
    setPayingRow(null);
  }

  async function pagarTodo(loanId,fechaPago){
    const pendientes=sched.filter(r=>r.prestamo_id===loanId&&getEst(r)!=='Pagado'&&getEst(r)!=='Adelantado');
    for(const r of pendientes){
      await db.from('cronograma').update({tipo_pago:'PAGO ADELANTADO',monto_pagado:N(r.cuota_base),mora:null,fecha_pago:fechaPago}).eq('id',r.id);
    }
    setSched(p=>p.map(r=>pendientes.find(x=>x.id===r.id)?{...r,tipo_pago:'PAGO ADELANTADO',monto_pagado:N(r.cuota_base),mora:null,fecha_pago:fechaPago}:r));
    showToast('✓ Préstamo cancelado — '+pendientes.length+' cuotas marcadas como pagadas');
  }

  async function eliminarPrestamo(id){
    if(!confirm('¿Eliminar este préstamo y su cronograma? No se puede deshacer.'))return;
    await db.from('prestamos').delete().eq('id',id);
    setLoans(p=>p.filter(l=>l.id!==id));
    setSched(p=>p.filter(r=>r.prestamo_id!==id));
    showToast('Préstamo eliminado');
  }

  function goTo(v){setView(v);setMob(false);if(v!=='schedule')setViewLoan(null);if(v!=='payments')setPayingRow(null);}

  if(authLoading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh'}}><Spin/></div>;
  if(!user)return<Login onLogin={setUser}/>;

  const nav=[{id:'dashboard',ic:'dash',lbl:'Dashboard'},{id:'newLoan',ic:'plus',lbl:'Nuevo préstamo'},{id:'loans',ic:'list',lbl:'Préstamos'},{id:'schedule',ic:'cal',lbl:'Cronograma'},{id:'payments',ic:'pay',lbl:'Registrar pago'}];

  const SBC=()=>(
    <>
      <div className="sb-hd">
        <div className="sb-em"><svg viewBox="0 0 24 24" style={{width:16,height:16}}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="var(--gold)" stroke="none"/><polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="rgba(0,0,0,.4)" strokeWidth="1.5"/></svg></div>
        <div className="sb-brand">Crédito <em>San Juan</em></div>
        <div className="sb-tag">Gestión financiera</div>
      </div>
      <div className="sb-div"/>
      <div className="sb-nav">
        <div className="sb-sec">Menú</div>
        {nav.map(n=><div key={n.id} className={`nl${view===n.id?' on':''}`} onClick={()=>goTo(n.id)}><div className="nl-ic">{IC[n.ic]}</div>{n.lbl}</div>)}
      </div>
      <div className="sb-ft">
        <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:9}}>
          <div className="sb-av">{user.email[0].toUpperCase()}</div>
          <div className="sb-email">{user.email}</div>
        </div>
        <button className="btn-lo" onClick={()=>db.auth.signOut()}>Cerrar sesión</button>
      </div>
    </>
  );

  return(
    <div className="shell">
      <div className="sb"><SBC/></div>
      {mob&&<><div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.42)',zIndex:199}} onClick={()=>setMob(false)}/><div className="sb open"><SBC/></div></>}
      <div className="main">
        <div className="mob-bar">
          <button onClick={()=>setMob(true)} style={{background:'rgba(255,255,255,.12)',border:'none',color:'#fff',borderRadius:6,padding:'6px 12px',fontSize:13,cursor:'pointer'}}>☰</button>
          <span style={{fontFamily:"'Fraunces',serif",color:'#fff',fontSize:15,fontWeight:700}}>Crédito San Juan</span>
          <div style={{width:40}}/>
        </div>
        {loading&&<div style={{position:'fixed',top:14,right:14,background:'var(--dark)',color:'#fff',borderRadius:8,padding:'8px 16px',fontSize:12,zIndex:99}}>Cargando...</div>}
        <div className="page">
          {dbError&&(
            <div className="err-box">
              <strong>⚠ Error de base de datos — ejecuta el SQL de permisos en Supabase</strong>
              {dbError}
            </div>
          )}
          {view==='dashboard'&&<Dashboard loans={loans} sched={sched} goTo={goTo} setPayingRow={setPayingRow}/>}
          {view==='newLoan'  &&<NuevoPrestamo onCreate={crearPrestamo}/>}
          {view==='loans'   &&<Prestamos loans={loans} sched={sched} onDelete={eliminarPrestamo} onVer={l=>{setViewLoan(l);goTo('schedule');}} onPagar={r=>{setPayingRow(r);goTo('payments');}}/>}
          {view==='schedule'&&<Cronograma loans={loans} sched={sched} viewLoan={viewLoan} onPagar={r=>{setPayingRow(r);goTo('payments');}}/>}
          {view==='payments'&&<RegistrarPago loans={loans} sched={sched} payingRow={payingRow} onPay={registrarPago} onPagarTodo={pagarTodo}/>}
        </div>
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

/* ══ DASHBOARD ══════════════════════════════════════════════════ */
function Dashboard({loans,sched,goTo,setPayingRow}){
  const venc=sched.filter(r=>getEst(r)==='Vencido');
  const totPres=loans.reduce((a,l)=>a+N(l.monto),0);
  const totCob=sched.filter(r=>r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
  const montoVenc=venc.reduce((a,r)=>a+getSaldo(r),0);
  const porCobrar=sched.filter(r=>!['Pagado','Adelantado'].includes(getEst(r))).reduce((a,r)=>a+getSaldo(r),0);
  const nPag=sched.filter(r=>['Pagado','Adelantado'].includes(getEst(r))).length;
  const nPend=sched.filter(r=>getEst(r)==='Pendiente').length;
  const nVenc=venc.length;
  const totInt=sched.reduce((a,r)=>a+N(r.interes_cuota),0);
  const totMora=sched.reduce((a,r)=>a+N(r.mora||0),0);
  const total=sched.length||1;
  const meses=Array.from({length:6},(_,i)=>{
    const d=new Date();d.setMonth(d.getMonth()-(5-i));
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const lbl=['En','Fe','Ma','Ab','My','Jn','Jl','Ag','Se','Oc','No','Di'][d.getMonth()];
    return{lbl,cob:sched.filter(r=>r.fecha_pago?.substring(0,7)===key).reduce((a,r)=>a+N(r.monto_pagado),0),pre:loans.filter(l=>l.fecha_prestamo?.substring(0,7)===key).reduce((a,l)=>a+N(l.monto),0)};
  });
  const maxM=Math.max(...meses.map(m=>Math.max(m.cob,m.pre)),1);

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div><div className="pg-ey">Panel de control</div><div className="pg-ti">Dashboard Financiero</div><div className="pg-su">{new Date().toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div>
      <div className="kpi-grid">
        {[
          {l:'Capital prestado',v:fmt(totPres),   c:'var(--dark)', bg:'var(--light)', ic:'trend',bar:'var(--dark)'},
          {l:'Total cobrado',   v:fmt(totCob),    c:'var(--green)',bg:'#dff2e8',      ic:'check',bar:'var(--green)'},
          {l:'Por cobrar',      v:fmt(porCobrar), c:'#a0620a',     bg:'#fef3e2',      ic:'coin', bar:'#d97706'},
          {l:'Monto vencido',   v:fmt(montoVenc), c:'var(--red)',  bg:'#fde8e8',      ic:'warn', bar:'var(--red2)'},
          {l:'Mora acumulada',  v:fmt(totMora),   c:'var(--red)',  bg:'#fde8e8',      ic:'warn', bar:'var(--red)'},
          {l:'Interés generado',v:fmt(totInt),    c:'var(--teal)', bg:'#e4f4f0',      ic:'trend',bar:'var(--teal2)'},
        ].map((k,i)=>(
          <div key={i} className="kpi">
            <div className="kpi-bar" style={{background:k.bar}}/>
            <div className="kpi-ic" style={{background:k.bg,color:k.c}}>{IC[k.ic]}</div>
            <div className="kpi-val" style={{color:k.c}}>{k.v}</div>
            <div className="kpi-lbl">{k.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:15}}>
        <div className="card">
          <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Estado de cuotas</div></div>
          <div className="c-bd">
            <div style={{display:'flex',gap:16,alignItems:'center'}}>
              <Donut segs={[{v:nPag,c:'#1e6e3a'},{v:nPend,c:'#2356a0'},{v:nVenc,c:'#b52a2a'}]} total={total} cv={sched.length} cl="cuotas"/>
              <div style={{flex:1,display:'grid',gap:9}}>
                {[{l:'Pagadas',n:nPag,c:'#1e6e3a'},{l:'Pendientes',n:nPend,c:'#2356a0'},{l:'Vencidas',n:nVenc,c:'#b52a2a'}].map(i=>(

                const bw=38,gap=12,x=i*(bw+gap);

                const hP=maxM>0?Math.max((m.pre/maxM)*78,m.pre>0?4:0):0;
                return<g key={i} transform={`translate(${x},0)`}>

              })}

        </div>

        <div className="card" style={{marginBottom:13,border:'1px solid #f5a5a5'}}>
          <div className="c-hd" style={{background:'#fde8e8',borderBottom:'1px solid #f5a5a5'}}>
            <div className="c-dot" style={{background:'var(--red)'}}/><div className="c-hd-t" style={{color:'var(--red)'}}>Cuotas vencidas — acción requerida ({venc.length})</div>

              <tr key={i}>
                <td style={{fontWeight:600}}>{r.cliente}</td>
                <td style={{color:'var(--grey)'}}>{r.n_cuota}</td>

          <div className="tbl-wrap"><table>
            <thead><tr><th>Cliente</th><th>Monto</th><th>Tipo</th><th>Cuotas</th><th>Inicio</th><th>Estado</th></tr></thead>

                <td style={{color:'var(--grey)'}}>{l.cuotas}</td>
                <td style={{color:'var(--grey)',fontSize:12}}>{fmtD(l.fecha_prestamo)}</td>
                <td><Badge s={est}/></td>

          </table></div>

          <div style={{fontFamily:"'Fraunces',serif",fontSize:17,color:'var(--ink)',marginBottom:7}}>Sin préstamos registrados</div>

}

/* ══ NUEVO PRÉSTAMO ═════════════════════════════════════════════ */
function NuevoPrestamo({onCreate}){
  const[f,setF]=useState({
    cliente:'',garante:'',referencia:'',clienteExterno:'NO',
    monto:'',tasaPct:'6',tipo:'MENSUAL',cuotas:'',
    desgravamen:'0',gastoOperativo:'0',
    fechaPrestamo:todayStr(),
  });
  const[prev,setPrev]=useState(false);
  const[saving,setSaving]=useState(false);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));

  const m=N(f.monto),t=N(f.tasaPct)/100,c=N(f.cuotas),d=N(f.desgravamen),go=N(f.gastoOperativo);
  const cap=c>0?parseFloat((m/c).toFixed(2)):0;
  const int=parseFloat(calcInt(m,t,f.tipo,c).toFixed(2));
  const cota=parseFloat((cap+int+d+go).toFixed(2));
  const total=parseFloat((m+int*c+(d+go)*c).toFixed(2));
  const prevRows=c>0?Array.from({length:Math.min(c,60)},(_,i)=>({n:i+1,fecha:getFV(f.fechaPrestamo,i+1,f.tipo)})):[];

  async function submit(){
    if(!f.cliente.trim()||!f.monto||!f.cuotas){alert('Completa: cliente, monto y número de cuotas.');return;}
    setSaving(true);
    const ok=await onCreate({...f,tasa:t});// pasamos tasa como decimal
    setSaving(false);
    if(ok){setF({cliente:'',garante:'',referencia:'',clienteExterno:'NO',monto:'',tasaPct:'6',tipo:'MENSUAL',cuotas:'',desgravamen:'0',gastoOperativo:'0',fechaPrestamo:todayStr()});setPrev(false);}
  }

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div><div className="pg-ey">Operaciones</div><div className="pg-ti">Nuevo Préstamo</div><div className="pg-su">Completa los datos. Usa "Vista previa" para verificar el cronograma antes de guardar.</div></div>
      <div style={{display:'grid',gridTemplateColumns:'minmax(0,470px) 1fr',gap:18,alignItems:'start'}}>
        <div className="card">
          <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Datos del préstamo</div></div>
          <div className="c-bd">
            <div className="sec-tag">Datos del cliente</div>
            <div style={{display:'grid',gap:11,marginBottom:18}}>
              <div><span className="lbl">Nombre del cliente *</span><input className="inp" value={f.cliente} onChange={e=>s('cliente',e.target.value)} placeholder="Nombre completo"/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><span className="lbl">Socio garante</span><input className="inp" value={f.garante} onChange={e=>s('garante',e.target.value)}/></div>
                <div><span className="lbl">Referenciado por</span><input className="inp" value={f.referencia} onChange={e=>s('referencia',e.target.value)}/></div>
              </div>
              <div style={{maxWidth:175}}><span className="lbl">Cliente externo</span>
                <select className="inp" value={f.clienteExterno} onChange={e=>s('clienteExterno',e.target.value)}><option>NO</option><option>SI</option></select>
              </div>
            </div>
            <div className="sec-tag">Parámetros del préstamo</div>
            <div style={{display:'grid',gap:11}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><span className="lbl">Monto (S/.) *</span><input className="inp" type="number" value={f.monto} onChange={e=>s('monto',e.target.value)} placeholder="900"/></div>
                <div>
                  <span className="lbl">Tasa de interés</span>
                  <div className="tasa-wrap">
                    <input className="inp" type="number" step="0.5" value={f.tasaPct} onChange={e=>s('tasaPct',e.target.value)} placeholder="6"/>
                    <span className="tasa-suf">%</span>
                  </div>
                  <span style={{fontSize:11,color:'var(--grey)',marginTop:3,display:'block'}}>Escribe 6 para 6% mensual</span>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><span className="lbl">N° cuotas *</span><input className="inp" type="number" value={f.cuotas} onChange={e=>s('cuotas',e.target.value)}/></div>
                <div><span className="lbl">Tipo de cronograma</span>
                  <select className="inp" value={f.tipo} onChange={e=>s('tipo',e.target.value)}><option>MENSUAL</option><option>SEMANAL</option><option>DIARIO</option></select>
                </div>
              </div>
              <DatePicker label="Fecha del préstamo" value={f.fechaPrestamo} onChange={v=>s('fechaPrestamo',v)}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div>
                  <span className="lbl">Desgravamen / cuota (S/.)</span>
                  <input className="inp" type="number" value={f.desgravamen} onChange={e=>s('desgravamen',e.target.value)}/>
                  <span style={{fontSize:11,color:'var(--grey)',marginTop:3,display:'block'}}>Seguro de vida por cuota</span>
                </div>
                <div>
                  <span className="lbl">Gasto operativo / cuota (S/.)</span>
                  <input className="inp" type="number" value={f.gastoOperativo} onChange={e=>s('gastoOperativo',e.target.value)}/>
                  <span style={{fontSize:11,color:'var(--grey)',marginTop:3,display:'block'}}>Cargo administrativo por cuota</span>
                </div>
              </div>
            </div>
            {m>0&&c>0&&(
              <div style={{marginTop:16,background:'linear-gradient(135deg,var(--light),#f0faf6)',border:'1.5px solid var(--border)',borderRadius:10,padding:'14px 17px'}}>
                <div style={{fontSize:10,fontWeight:700,color:'var(--teal)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:10}}>Resumen calculado</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'7px 18px',fontSize:13,marginBottom:12}}>
                  <div><span style={{color:'var(--grey)',fontSize:11.5}}>Capital / cuota</span><div style={{fontWeight:600}}>{fmt(cap)}</div></div>
                  <div><span style={{color:'var(--grey)',fontSize:11.5}}>Interés / cuota ({f.tasaPct}%)</span><div style={{fontWeight:600}}>{fmt(int)}</div></div>
                  <div><span style={{color:'var(--grey)',fontSize:11.5}}>Desgravamen</span><div style={{fontWeight:600}}>{fmt(d)}</div></div>
                  <div><span style={{color:'var(--grey)',fontSize:11.5}}>Gasto operativo</span><div style={{fontWeight:600}}>{fmt(go)}</div></div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div style={{background:'var(--dark)',borderRadius:8,padding:'10px 14px',textAlign:'center'}}>
                    <div style={{fontSize:9.5,color:'rgba(255,255,255,.55)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:3}}>CUOTA TOTAL</div>
                    <div style={{fontSize:20,fontWeight:700,color:'#fff'}}>{fmt(cota)}</div>
                  </div>
                  <div style={{background:'var(--teal)',borderRadius:8,padding:'10px 14px',textAlign:'center'}}>
                    <div style={{fontSize:9.5,color:'rgba(255,255,255,.55)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:3}}>MONTO FINAL</div>
                    <div style={{fontSize:20,fontWeight:700,color:'#fff'}}>{fmt(total)}</div>
                  </div>
                </div>
              </div>
            )}
            <div style={{display:'flex',gap:10,marginTop:16}}>
              <button className="btn-ol" onClick={()=>setPrev(!prev)}>Vista previa</button>
              <button className="btn" onClick={submit} disabled={saving}>{saving?'Guardando...':'✓ Ejecutar — Guardar'}</button>
            </div>
          </div>
        </div>

        {prev&&c>0&&(
          <div className="card" style={{maxHeight:600,overflow:'auto',animation:'fadeIn .2s ease'}}>
            <div className="c-header">
              <div className="c-header-title">CRONOGRAMA DE PAGOS</div>
              <div className="c-header-sub">Vista previa — {f.cliente||'Cliente'}</div>
            </div>
            <div className="crono-info">
              <div style={{borderRight:'1px solid var(--border)'}}>
                {[['Cliente',f.cliente||'—'],['Monto',fmt(m)],['Tipo',f.tipo],['N° Cuotas',`${c} cuotas`]].map(([k,v])=>(<div key={k} className="ci-row"><div className="ci-k">{k}</div><div className="ci-v">{v}</div></div>))}
              </div>
              <div>
                {[['Garante',f.garante||'—'],['Tasa',f.tasaPct+'%'],['Desgravamen',fmt(d)],['G. Operativo',fmt(go)]].map(([k,v])=>(<div key={k} className="ci-row"><div className="ci-k">{k}</div><div className="ci-v">{v}</div></div>))}
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',borderBottom:'1px solid var(--border)'}}>
              <div style={{borderRight:'1px solid var(--border)'}}><div className="c-sum-lbl">CUOTA</div><div className="c-sum-box" style={{borderRight:'1px solid rgba(255,255,255,.12)'}}>{fmt(cota)}</div></div>
              <div><div className="c-sum-lbl">MONTO TOTAL</div><div className="c-sum-box">{fmt(total)}</div></div>
            </div>
            <div className="tbl-wrap"><table>
              <thead><tr><th>#</th><th>Fecha pago</th><th>Capital</th><th>Interés</th><th>Degrav.</th><th>G.Oper.</th><th>Cuota Base</th><th>TOTAL</th></tr></thead>
              <tbody>{prevRows.map(r=>(
                <tr key={r.n}>
                  <td style={{fontWeight:700,color:'var(--dark)',background:'var(--light)'}}>{r.n}</td>
                  <td style={{fontSize:12}}>{fmtD(r.fecha)}</td>
                  <td>{fmt(cap)}</td><td>{fmt(int)}</td><td>{fmt(d)}</td><td>{fmt(go)}</td>
                  <td style={{fontWeight:700,color:'var(--dark)',background:'var(--light)'}}>{fmt(cota)}</td>
                  <td style={{fontWeight:700,color:'var(--green)',background:'#dff2e8'}}>{fmt(cota)}</td>
                </tr>
              ))}</tbody>
              <tfoot><tr><td colSpan={7} style={{textAlign:'right',fontSize:11}}>MONTO TOTAL</td><td style={{color:'var(--green)'}}>{fmt(total)}</td></tr></tfoot>
            </table></div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══ PRÉSTAMOS ══════════════════════════════════════════════════ */
function Prestamos({loans,sched,onDelete,onVer,onPagar}){
  const[q,setQ]=useState('');
  const fl=loans.filter(l=>l.cliente.toLowerCase().includes(q.toLowerCase())||String(l.id).includes(q));
  const cob=id=>sched.filter(r=>r.prestamo_id===id&&r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
  const sig=id=>sched.filter(r=>r.prestamo_id===id&&!['Pagado','Adelantado'].includes(getEst(r))).sort((a,b)=>a.n_cuota-b.n_cuota)[0];
  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div><div className="pg-ey">Portafolio</div><div className="pg-ti">Préstamos</div></div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,marginBottom:13,flexWrap:'wrap'}}>
        <span style={{fontSize:13,color:'var(--grey)'}}>{fl.length} préstamo{fl.length!==1?'s':''}</span>
        <input className="inp" placeholder="Buscar cliente o ID..." value={q} onChange={e=>setQ(e.target.value)} style={{width:220}}/>
      </div>
      <div className="card"><div className="tbl-wrap"><table>
        <thead><tr><th>ID</th><th>Cliente</th><th>Monto</th><th>Tipo</th><th>Cuotas</th><th>Tasa</th><th>Inicio</th><th>Cobrado</th><th>Registrado por</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody>
          {fl.length===0&&<tr><td colSpan={11} style={{textAlign:'center',padding:44,color:'var(--grey)'}}>No se encontraron préstamos</td></tr>}
          {fl.map(l=>{
            const cuotas=sched.filter(r=>r.prestamo_id===l.id);
            const est=getEstPrestamo(cuotas);
            const s2=sig(l.id);
            return<tr key={l.id}>
              <td style={{color:'#bbb',fontSize:11}}>#{l.id}</td>
              <td><div style={{fontWeight:600}}>{l.cliente}</div>{l.garante&&<div style={{fontSize:11,color:'var(--grey)'}}>Gar: {l.garante}</div>}</td>
              <td style={{fontWeight:700,color:'var(--dark)'}}>{fmt(l.monto)}</td>
              <td><span style={{fontSize:10.5,background:'var(--light)',color:'var(--dark)',borderRadius:4,padding:'3px 8px',fontWeight:700}}>{l.tipo}</span></td>
              <td style={{color:'var(--grey)'}}>{l.cuotas}</td>
              <td style={{fontWeight:600}}>{(N(l.tasa)*100).toFixed(1)}%</td>
              <td style={{color:'var(--grey)',fontSize:12}}>{fmtD(l.fecha_prestamo)}</td>
              <td style={{fontWeight:700,color:'var(--green)'}}>{fmt(cob(l.id))}</td>
              <td style={{fontSize:11,color:'var(--grey)'}}>{l.creado_por_email?.split('@')[0]||'—'}</td>
              <td><Badge s={est}/></td>
              <td><div style={{display:'flex',gap:6,alignItems:'center'}}>
                <button className="btn-ol btn-sm" onClick={()=>onVer(l)}>Ver</button>
                {s2&&<button className="btn btn-sm" onClick={()=>onPagar(s2)}>Pagar</button>}
                <button className="btn-del" onClick={()=>onDelete(l.id)}>×</button>
              </div></td>
            </tr>;
          })}
        </tbody>
      </table></div></div>
    </div>
  );
}

/* ══ CRONOGRAMA ═════════════════════════════════════════════════ */
function Cronograma({loans,sched,viewLoan,onPagar}){
  const[selId,setSelId]=useState(viewLoan?.id??'');
  const loan=loans.find(l=>l.id===selId||l.id===Number(selId));
  const rows=loan?sched.filter(r=>r.prestamo_id===loan.id).sort((a,b)=>a.n_cuota-b.n_cuota):[];
  const totBase=rows.reduce((a,r)=>a+N(r.cuota_base),0);
  const totPag=rows.filter(r=>r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
  const totSaldo=rows.reduce((a,r)=>a+getSaldo(r),0);
  const cuota=rows.length>0?rows[0].cuota_base:0;
  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div><div className="pg-ey">Cronogramas</div><div className="pg-ti">Cronograma de pagos</div><div className="pg-su">Selecciona un préstamo para ver el cronograma completo</div></div>
      <div className="card" style={{marginBottom:13}}><div className="c-bd" style={{paddingBottom:14}}>
        <span className="lbl">Préstamo</span>
        <select className="inp" style={{maxWidth:440}} value={selId} onChange={e=>setSelId(e.target.value)}>
          <option value="">-- Selecciona un préstamo --</option>
          {loans.map(l=><option key={l.id} value={l.id}>{l.cliente} — {fmt(l.monto)} ({l.tipo}) — {fmtD(l.fecha_prestamo)}</option>)}
        </select>
      </div></div>
      {loan&&rows.length===0&&(
        <div className="card" style={{padding:22,background:'#fde8e8',border:'1px solid #f5a5a5'}}>
          <div style={{fontWeight:700,color:'var(--red)',marginBottom:4}}>Sin cuotas en base de datos</div>
          <div style={{color:'var(--red)',fontSize:13}}>Este préstamo fue creado antes del arreglo de permisos. Elimínalo desde "Préstamos" y vuelve a registrarlo — ahora sí funcionará correctamente.</div>
        </div>
      )}
      {loan&&rows.length>0&&(
        <div className="card">
          <div className="c-header"><div className="c-header-title">CRONOGRAMA DE PAGOS</div><div className="c-header-sub">Crédito San Juan · {new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'})}</div></div>
          <div className="crono-info">
            <div style={{borderRight:'1px solid var(--border)'}}>
              {[['Cliente',loan.cliente],['Monto',fmt(loan.monto)],['Tipo',loan.tipo],['N° Cuotas',`${loan.cuotas} cuotas`]].map(([k,v])=>(<div key={k} className="ci-row"><div className="ci-k">{k}</div><div className="ci-v" style={{fontWeight:k==='Cliente'?600:undefined}}>{v}</div></div>))}
            </div>
            <div>
              {[['Garante',loan.garante||'—'],['Tasa',(N(loan.tasa)*100).toFixed(1)+'%'],['Desgravamen',fmt(loan.desgravamen||0)],['G. Operativo',fmt(loan.gasto_operativo||0)]].map(([k,v])=>(<div key={k} className="ci-row"><div className="ci-k">{k}</div><div className="ci-v">{v}</div></div>))}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',borderBottom:'1px solid var(--border)'}}>
            <div style={{borderRight:'1px solid var(--border)'}}><div className="c-sum-lbl">CUOTA</div><div className="c-sum-box" style={{borderRight:'1px solid rgba(255,255,255,.12)'}}>{fmt(cuota)}</div></div>
            <div><div className="c-sum-lbl">MONTO TOTAL</div><div className="c-sum-box">{fmt(totBase)}</div></div>
          </div>
          <div style={{display:'flex',gap:10,padding:'12px 16px',background:'var(--alt)',borderBottom:'1px solid var(--border)',flexWrap:'wrap'}}>
            {[
              {l:'Saldo pendiente',v:totSaldo,c:totSaldo>0?'var(--red)':'var(--green)',bc:totSaldo>0?'#f5a5a5':'#a5d4b8',bg:totSaldo>0?'#fde8e8':'#dff2e8'},
              {l:'Total cobrado',v:totPag,c:'var(--green)',bc:'#a5d4b8',bg:'#dff2e8'},
              {l:'Cuotas restantes',v:rows.filter(r=>!['Pagado','Adelantado'].includes(getEst(r))).length,c:'var(--dark)',bc:'var(--border)',bg:'var(--light)',noFmt:true},
            ].map(i=>(<div key={i.l} className="c-pill" style={{background:i.bg,borderColor:i.bc}}><div className="c-pill-lbl" style={{color:i.c}}>{i.l}</div><div className="c-pill-val" style={{color:i.c}}>{i.noFmt?i.v:fmt(i.v)}</div></div>))}
          </div>
          <div className="tbl-wrap"><table>
            <thead><tr><th>#</th><th>Fecha Pago</th><th>Capital</th><th>Interés</th><th>Degrav.</th><th>G.Oper.</th><th>Cuota Base</th><th>Mora</th><th>TOTAL</th><th>Tipo Pago</th><th>Pagado</th><th>F. Pago</th><th>Estado</th><th>Saldo</th><th></th></tr></thead>
            <tbody>{rows.map(r=>{
              const est=getEst(r),tot2=N(r.cuota_base)+N(r.mora||0);
              return<tr key={r.id} style={est==='Vencido'?{background:'#fff8f8'}:{}}>
                <td style={{fontWeight:700,color:'var(--dark)',background:'var(--light)'}}>{r.n_cuota}</td>
                <td style={{color:est==='Vencido'?'var(--red)':undefined,fontWeight:est==='Vencido'?600:undefined,fontSize:12}}>{fmtD(r.fecha_vence)}</td>
                <td>{fmt(r.capital_cuota)}</td>
                <td>{fmt(r.interes_cuota)}</td>
                <td>{fmt(r.desgravamen)}</td>
                <td>{fmt(r.gasto_operativo||0)}</td>
                <td style={{fontWeight:700,color:'var(--dark)',background:'var(--light)'}}>{fmt(r.cuota_base)}</td>
                <td style={{color:'var(--red)'}}>{r.mora?fmt(r.mora):''}</td>
                <td style={{fontWeight:700,color:'var(--green)',background:'#dff2e8'}}>{fmt(tot2)}</td>
                <td style={{fontSize:11,color:'var(--grey)'}}>{r.tipo_pago}</td>
                <td style={{fontWeight:600,color:'var(--green)'}}>{r.monto_pagado?fmt(r.monto_pagado):''}</td>
                <td style={{fontSize:11,color:'var(--grey)'}}>{fmtD(r.fecha_pago)}</td>
                <td><Badge s={est}/></td>
                <td style={{fontWeight:700,color:getSaldo(r)>0?'var(--red)':'var(--green)'}}>{fmt(getSaldo(r))}</td>
                <td>{!['Pagado','Adelantado'].includes(est)&&<button className="btn btn-sm" onClick={()=>onPagar(r)}>Pagar</button>}</td>
              </tr>;
            })}</tbody>
            <tfoot><tr>
              <td colSpan={6} style={{textAlign:'right',fontSize:11,textTransform:'uppercase',letterSpacing:'.07em'}}>Totales</td>
              <td>{fmt(totBase)}</td><td/><td>{fmt(totBase)}</td><td/>
              <td style={{color:'var(--green)'}}>{fmt(totPag)}</td>
              <td colSpan={2}/>
              <td style={{color:totSaldo>0?'var(--red)':'var(--green)'}}>{fmt(totSaldo)}</td>
              <td/>
            </tr></tfoot>
          </table></div>
        </div>
      )}
    </div>
  );
}

/* ══ REGISTRAR PAGO ═════════════════════════════════════════════ */
function RegistrarPago({loans,sched,payingRow,onPay,onPagarTodo}){
  const[loanId,setLoanId]=useState('');
  const[rowId,setRowId]=useState('');
  const[pago,setPago]=useState({tipoPago:'NORMAL',montoPagado:'',mora:'',fechaPago:todayStr()});
  const[saving,setSaving]=useState(false);
  const sp=(k,v)=>setPago(p=>({...p,[k]:v}));

  useEffect(()=>{
    if(payingRow){setLoanId(String(payingRow.prestamo_id));setRowId(String(payingRow.id));}
  },[payingRow]);

  const loanIdN=Number(loanId)||0;
  const rowIdN=Number(rowId)||0;
  const loan=loans.find(l=>l.id===loanIdN);
  const todasCuotas=loanIdN?sched.filter(r=>r.prestamo_id===loanIdN):[];
  const pend=todasCuotas.filter(r=>!['Pagado','Adelantado'].includes(getEst(r))).sort((a,b)=>a.n_cuota-b.n_cuota);
  const row=rowIdN?pend.find(r=>r.id===rowIdN):null;
  const saldoTotal=todasCuotas.reduce((a,r)=>a+getSaldo(r),0);

  // Autocompletar monto según tipo
  useEffect(()=>{
    if(!row)return;
    if(pago.tipoPago==='NORMAL')          sp('montoPagado',String(row.cuota_base));
    else if(pago.tipoPago==='SOLO INTERES')sp('montoPagado',String(row.interes_cuota));
    else if(pago.tipoPago==='PAGO ADELANTADO')sp('montoPagado',String(row.cuota_base));
    else sp('montoPagado','');
  },[pago.tipoPago,rowId]);

  const ultPagos=[...sched].filter(r=>r.fecha_pago).sort((a,b)=>new Date(b.fecha_pago)-new Date(a.fecha_pago)).slice(0,15);

  async function submit(){
    if(pago.tipoPago==='TOTAL PRESTAMO'){
      setSaving(true);
      await onPagarTodo(loanIdN,pago.fechaPago);
      setSaving(false);setRowId('');setLoanId('');
      return;
    }
    if(!row||!pago.montoPagado){alert('Selecciona una cuota e ingresa el monto pagado.');return;}
    setSaving(true);
    await onPay(row.id,pago);
    setSaving(false);
    setPago({tipoPago:'NORMAL',montoPagado:'',mora:'',fechaPago:todayStr()});
    setRowId('');
  }

  const TIPOS=[
    {v:'NORMAL',           lbl:'Normal',           desc:'Paga la cuota completa'},
    {v:'PARCIAL',          lbl:'Parcial',           desc:'Abono menor al monto de la cuota'},
    {v:'SOLO INTERES',     lbl:'Solo interés',      desc:'Solo paga interés, no reduce capital'},
    {v:'PAGO ADELANTADO',  lbl:'Pago adelantado',   desc:'Paga esta cuota antes de su fecha'},
    {v:'TOTAL PRESTAMO',   lbl:'Cancelar préstamo', desc:'Cancela todas las cuotas pendientes de una vez'},
  ];

  const noCuota=pago.tipoPago==='TOTAL PRESTAMO';

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div><div className="pg-ey">Cobranzas</div><div className="pg-ti">Registrar Pago</div><div className="pg-su">Selecciona préstamo, elige tipo de pago y confirma</div></div>
      <div style={{display:'grid',gridTemplateColumns:'minmax(0,440px) 1fr',gap:18,alignItems:'start'}}>
        <div className="card">
          <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Datos del pago</div></div>
          <div className="c-bd">
            <div style={{display:'grid',gap:13}}>
              <div>
                <span className="lbl">Préstamo</span>
                <select className="inp" value={loanId} onChange={e=>{setLoanId(e.target.value);setRowId('');setPago(p=>({...p,tipoPago:'NORMAL',montoPagado:''}));}}>
                  <option value="">— Selecciona un préstamo —</option>
                  {loans.map(l=><option key={l.id} value={String(l.id)}>{l.cliente} · {fmt(l.monto)} ({l.tipo})</option>)}
                </select>
              </div>

              {/* Tipo de pago — radio buttons visibles */}
              {loanIdN>0&&(
                <div>
                  <span className="lbl">Tipo de pago</span>
                  <div style={{display:'grid',gap:6}}>
                    {TIPOS.map(tp=>(
                      <label key={tp.v} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:8,border:`1.5px solid ${pago.tipoPago===tp.v?'var(--teal2)':'var(--border)'}`,background:pago.tipoPago===tp.v?'#f0faf6':'#fff',cursor:'pointer',transition:'all .15s'}}>
                        <input type="radio" name="tipoPago" value={tp.v} checked={pago.tipoPago===tp.v} onChange={()=>sp('tipoPago',tp.v)} style={{accentColor:'var(--teal)',width:14,height:14,flexShrink:0}}/>
                        <div>
                          <div style={{fontWeight:600,fontSize:13,color:pago.tipoPago===tp.v?'var(--dark)':'#444'}}>{tp.lbl}</div>
                          <div style={{fontSize:11,color:'var(--grey)'}}>{tp.desc}</div>
                        </div>
                      </label>
                    ))}
                  </div>
                </div>
              )}

              {/* Cuota — solo si no es cancelar total */}
              {loanIdN>0&&!noCuota&&(
                <div>
                  <span className="lbl">Cuota a pagar</span>
                  <select className="inp" value={rowId} onChange={e=>setRowId(e.target.value)} disabled={pend.length===0}>
                    <option value="">— Selecciona cuota —</option>
                    {pend.map(r=><option key={r.id} value={String(r.id)}>Cuota {r.n_cuota} · {fmtD(r.fecha_vence)} · {fmt(r.cuota_base)} [{getEst(r)}]</option>)}
                  </select>
                  {pend.length===0&&<div style={{fontSize:12,color:'var(--green)',marginTop:5,padding:'7px 12px',background:'#dff2e8',borderRadius:6}}>✓ Todas las cuotas de este préstamo están pagadas</div>}
                </div>
              )}
            </div>

            {/* Detalle cuota */}
            {row&&!noCuota&&(
              <div style={{margin:'14px 0',background:'linear-gradient(135deg,var(--light),#f0faf6)',border:'1.5px solid var(--border)',borderRadius:10,padding:'13px 16px'}}>
                <div style={{fontSize:10,fontWeight:700,color:'var(--teal)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:9}}>Detalle de la cuota</div>
                <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'7px 14px',fontSize:13}}>
                  <span style={{color:'var(--grey)'}}>Cliente:</span>    <span style={{fontWeight:600}}>{row.cliente}</span>
                  <span style={{color:'var(--grey)'}}>Cuota N°:</span>   <span style={{fontWeight:700}}>{row.n_cuota} de {loan?.cuotas}</span>
                  <span style={{color:'var(--grey)'}}>Vence:</span>      <span style={getEst(row)==='Vencido'?{color:'var(--red)',fontWeight:600}:{fontSize:12}}>{fmtD(row.fecha_vence)}</span>
                  <span style={{color:'var(--grey)'}}>Estado:</span>     <span><Badge s={getEst(row)}/></span>
                  <span style={{color:'var(--grey)'}}>Cuota base:</span> <span style={{fontWeight:700,color:'var(--dark)',fontSize:16}}>{fmt(row.cuota_base)}</span>
                  <span style={{color:'var(--grey)'}}>Saldo total préstamo:</span><span style={{fontWeight:700,color:'var(--red)'}}>{fmt(saldoTotal)}</span>
                </div>
              </div>
            )}

            {/* Cancelar total */}
            {noCuota&&loanIdN>0&&(
              <div style={{margin:'14px 0',padding:'13px 16px',background:'#dff2e8',border:'1px solid #a5d4b8',borderRadius:9}}>
                <div style={{fontWeight:700,color:'var(--green)',marginBottom:5}}>Cancelar préstamo completo</div>
                <div style={{fontSize:13,color:'var(--green)',marginBottom:10}}>Se marcarán como pagadas <strong>{pend.length} cuotas</strong> pendientes. Saldo total: <strong>{fmt(saldoTotal)}</strong></div>
              </div>
            )}

            {/* Montos */}
            {loanIdN>0&&(row||noCuota)&&(
              <>
                {!noCuota&&(
                  <div style={{display:'grid',gap:11,marginBottom:11}}>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                      <div>
                        <span className="lbl">Monto pagado (S/.) *</span>
                        <input className="inp inp-green" type="number" value={pago.montoPagado} onChange={e=>sp('montoPagado',e.target.value)} placeholder={String(row?.cuota_base||'')} readOnly={pago.tipoPago==='NORMAL'||pago.tipoPago==='SOLO INTERES'||pago.tipoPago==='PAGO ADELANTADO'} style={(pago.tipoPago==='NORMAL'||pago.tipoPago==='SOLO INTERES'||pago.tipoPago==='PAGO ADELANTADO')?{opacity:.8}:{}}/>
                      </div>
                      <div><span className="lbl">Mora (S/.)</span><input className="inp" type="number" value={pago.mora} onChange={e=>sp('mora',e.target.value)} placeholder="0"/></div>
                    </div>
                  </div>
                )}
                <DatePicker label="Fecha de pago" value={pago.fechaPago} onChange={v=>sp('fechaPago',v)}/>
                <button className="btn" style={{width:'100%',marginTop:14,padding:'12px'}} onClick={submit} disabled={saving}>{saving?'Guardando...':'✓ Confirmar pago'}</button>
              </>
            )}
          </div>
        </div>

        <div className="card">
          <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Últimos pagos registrados</div></div>
          <div className="tbl-wrap"><table>
            <thead><tr><th>Cliente</th><th>N° Cuota</th><th>Tipo</th><th>Pagado</th><th>Mora</th><th>Fecha pago</th><th>Estado</th></tr></thead>
            <tbody>
              {ultPagos.length===0&&<tr><td colSpan={7} style={{textAlign:'center',padding:40,color:'var(--grey)'}}>Sin pagos registrados aún</td></tr>}
              {ultPagos.map((r,i)=>(
                <tr key={i}>
                  <td style={{fontWeight:500}}>{r.cliente}</td>
                  <td style={{color:'var(--grey)'}}>{r.n_cuota}</td>
                  <td style={{fontSize:11,color:'var(--grey)'}}>{r.tipo_pago}</td>
                  <td style={{fontWeight:700,color:'var(--green)'}}>{fmt(r.monto_pagado)}</td>
                  <td style={{color:r.mora?'var(--red)':'var(--grey)'}}>{r.mora?fmt(r.mora):'—'}</td>
                  <td style={{fontSize:12}}>{fmtD(r.fecha_pago)}</td>
                  <td><Badge s={getEst(r)}/></td>
                </tr>
              ))}
            </tbody>
          </table></div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
