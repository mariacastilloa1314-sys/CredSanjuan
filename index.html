<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;min-height:100vh}
body{background:#f2f5f2;color:#1a2e1a;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;font-size:14px}
input,select,button{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#b5c9b5;border-radius:2px}
:root{
  --ink:#0d1f0d;--dark:#1B4F45;--teal:#2d8a7a;--teal2:#379F8B;
  --light:#e8f0e8;--mint:#d4ede5;--gold:#b8973a;--gold2:#d4ac44;
  --red:#b52a2a;--red2:#dc3545;--green:#1e6e3a;--grey:#6b7f6b;
  --border:#d0ddd0;--white:#fff;--alt:#f7faf7;--bg:#f2f5f2;
  --sh:0 1px 3px rgba(13,31,13,.07),0 4px 16px rgba(13,31,13,.05);
  --sh2:0 4px 24px rgba(13,31,13,.10);
}
.shell{display:flex;min-height:100vh}
.sb{width:228px;background:var(--ink);display:flex;flex-direction:column;min-height:100vh;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,rgba(184,151,58,.25) 30%,rgba(184,151,58,.25) 70%,transparent)}
.sb-hd{padding:26px 20px 18px}
.sb-em{width:34px;height:34px;border:1.5px solid var(--teal);border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:11px}
.sb-brand{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:#fff;line-height:1.2}
.sb-brand em{color:rgba(255,255,255,.85);font-style:normal;font-weight:300}
.sb-tag{font-size:9.5px;color:rgba(255,255,255,.3);letter-spacing:.16em;text-transform:uppercase;margin-top:4px}
.sb-div{height:1px;background:linear-gradient(to right,rgba(45,138,122,.4),transparent);margin:6px 20px 14px}
.sb-nav{padding:0 10px;flex:1}
.sb-sec{font-size:9px;font-weight:700;color:rgba(255,255,255,.22);letter-spacing:.16em;text-transform:uppercase;padding:12px 10px 5px}
.nl{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.52);margin-bottom:1px;transition:all .18s;border-left:2px solid transparent}
.nl:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.82)}
.nl.on{background:rgba(45,138,122,.14);color:var(--teal2);border-left-color:var(--teal)}
.nl-ic{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:rgba(255,255,255,.05);flex-shrink:0}
.nl.on .nl-ic{background:rgba(45,138,122,.18)}
.nl-ic svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.sb-ft{padding:14px 20px;border-top:1px solid rgba(255,255,255,.07)}
.sb-av{width:28px;height:28px;border-radius:6px;background:rgba(45,138,122,.22);border:1px solid rgba(45,138,122,.4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gold2);flex-shrink:0}
.sb-email{font-size:11px;color:rgba(255,255,255,.38);word-break:break-all;line-height:1.3}
.btn-lo{width:100%;background:transparent;color:rgba(255,255,255,.38);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:7px;font-size:11px;cursor:pointer;transition:all .18s;margin-top:9px}
.btn-lo:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.22)}
.main{flex:1;overflow:auto;background:var(--bg)}
.page{padding:28px 30px;max-width:1400px}
.pg-ey{font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.14em;margin-bottom:3px}
.pg-ti{font-family:'DM Sans',sans-serif;font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.pg-su{font-size:12.5px;color:var(--grey);margin-top:3px;margin-bottom:20px}
.card{background:var(--white);border-radius:6px;border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden}
.c-hd{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.c-dot{width:5px;height:5px;border-radius:50%;background:var(--teal2);flex-shrink:0}
.c-hd-t{font-size:11.5px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.06em}
.c-bd{padding:18px}
.sec-tag{display:inline-flex;align-items:center;background:var(--mint);color:var(--dark);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;padding:4px 11px;border-radius:20px;margin-bottom:12px}
.btn{background:var(--dark);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-weight:600;cursor:pointer;font-size:13px;transition:all .18s}
.btn:hover{background:var(--teal)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ol{background:transparent;color:var(--dark);border:1.5px solid var(--border);border-radius:8px;padding:9px 18px;font-weight:600;cursor:pointer;font-size:13px;transition:all .18s}
.btn-ol:hover{border-color:var(--teal);color:var(--teal);background:var(--mint)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-del{background:transparent;color:#ccc;border:1px solid #eee;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:16px;transition:all .18s}
.btn-del:hover{color:var(--red);border-color:#fcc;background:#fff5f5}
.lbl{font-size:10.5px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.09em;display:block;margin-bottom:5px}
.inp{background:#fff;border:1.5px solid var(--border);color:var(--ink);border-radius:8px;padding:9px 12px;font-size:13.5px;width:100%;outline:none;transition:border .15s,box-shadow .15s}
.inp:focus{border-color:var(--teal2);box-shadow:0 0 0 3px rgba(45,138,122,.09)}
.inp option{background:#fff}
.inp-green{background:#e8f7ef;border-color:#7dbfa0;color:var(--green);font-weight:600}
/* Fecha custom */
.date-inp{display:grid;grid-template-columns:60px 1fr 80px;gap:6px}
.date-inp select{background:#fff;border:1.5px solid var(--border);color:var(--ink);border-radius:8px;padding:9px 8px;font-size:13px;outline:none;cursor:pointer;width:100%}
.date-inp select:focus{border-color:var(--teal2);box-shadow:0 0 0 3px rgba(45,138,122,.09)}
/* Tasa */
.tasa-wrap{position:relative}
.tasa-wrap .inp{padding-right:34px}
.tasa-suf{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--grey);font-size:13px;font-weight:600;pointer-events:none}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:2px solid var(--border)}
thead th{padding:10px 13px;text-align:left;background:var(--alt);color:var(--grey);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
tbody tr{border-bottom:1px solid #edf2ed;transition:background .1s}
tbody tr:hover td{background:#f0f7f2}
tbody td{padding:10px 13px;vertical-align:middle}
tfoot td{padding:10px 13px;background:var(--light);font-weight:700;color:var(--dark);border-top:2px solid var(--border)}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.b-pend{background:#e8f0fb;color:#2356a0}.b-pend::before{background:#2356a0}
.b-venc{background:#fde8e8;color:var(--red)}.b-venc::before{background:var(--red)}
.b-paid{background:#dff2e8;color:var(--green)}.b-paid::before{background:var(--green)}
.b-part{background:#fef3e2;color:#a0620a}.b-part::before{background:#a0620a}
.b-solo{background:#f0eafc;color:#6b2fa0}.b-solo::before{background:#6b2fa0}
.b-adel{background:#e0f0ff;color:#1565c0}.b-adel::before{background:#1565c0}
.b-actv{background:#dff2e8;color:var(--green)}.b-actv::before{background:var(--green)}
.b-vencP{background:#fde8e8;color:var(--red)}.b-vencP::before{background:var(--red)}
.b-encu{background:#fef3e2;color:#a0620a}.b-encu::before{background:#a0620a}
.b-canc{background:#efefef;color:#777}.b-canc::before{background:#aaa}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.kpi:hover{box-shadow:var(--sh2)}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:3px}
.kpi-ic{display:none}
.kpi-ic svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.kpi-val{font-size:18px;font-weight:700;color:var(--dark);margin-bottom:4px;line-height:1;letter-spacing:-.02em;font-family:'DM Sans',sans-serif}
.kpi-lbl{font-size:10px;color:var(--grey);font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.toast{position:fixed;bottom:22px;right:22px;padding:12px 18px;border-radius:6px;font-weight:600;font-size:13px;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,.2);display:flex;align-items:center;gap:9px;animation:slideUp .22s ease;max-width:380px}
.t-ok{background:var(--ink);color:#fff}
.t-err{background:#b52a2a;color:#fff}
.t-warn{background:#d97706;color:#fff}
/* Error box visible */
.err-box{background:#fde8e8;border:1.5px solid #f5a5a5;border-radius:9px;padding:13px 16px;margin-bottom:14px;font-size:13px;color:#8b1a1a}
.err-box strong{display:block;margin-bottom:4px;color:var(--red)}
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#0a180a 0%,#1B4F45 55%,#2d8a7a 100%);padding:16px;position:relative;overflow:hidden}
.login-bg::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;border:1px solid rgba(184,151,58,.1);top:50%;left:50%;transform:translate(-50%,-50%)}
.login-card{background:rgba(255,255,255,.97);border-radius:18px;padding:38px 34px;width:100%;max-width:370px;box-shadow:0 24px 80px rgba(0,0,0,.28);position:relative;z-index:1}
.c-header{background:linear-gradient(135deg,var(--dark) 0%,var(--teal) 100%);padding:18px 26px}
.c-header-title{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:#fff;letter-spacing:.05em}
.c-header-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px}
.crono-info{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.ci-row{display:grid;grid-template-columns:130px 1fr;border-bottom:1px solid var(--border)}
.ci-row:last-child{border-bottom:none}
.ci-k{background:var(--light);padding:9px 14px;font-weight:700;font-size:11.5px;color:var(--dark);border-right:1px solid var(--border);display:flex;align-items:center}
.ci-v{padding:9px 14px;font-size:13px;color:var(--ink);display:flex;align-items:center}
.c-sum-lbl{font-size:9.5px;color:var(--grey);text-transform:uppercase;letter-spacing:.1em;text-align:center;padding:7px;background:var(--alt)}
.c-sum-box{padding:14px 20px;text-align:center;font-size:21px;font-weight:700;color:#fff;background:var(--dark)}
.c-pill{padding:8px 14px;border-radius:8px;border:1px solid}
.c-pill-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.c-pill-val{font-size:15px;font-weight:700}
.donut-wrap{position:relative;width:110px;height:110px;flex-shrink:0}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-cv{font-size:18px;font-weight:700;color:var(--ink);line-height:1}
.donut-cl{font-size:9px;color:var(--grey);text-transform:uppercase;letter-spacing:.07em}
.mob-bar{display:none;padding:11px 16px;background:var(--ink);align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
@media(max-width:768px){
  .sb{display:none}.sb.open{display:flex;position:fixed;left:0;top:0;bottom:0;z-index:200;width:240px}
  .mob-bar{display:flex!important}
  .page{padding:8px 8px 60px}
  .crono-info{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:1fr 1fr!important;gap:7px}
  .kpi{padding:10px 11px}
  .kpi-val{font-size:15px!important}
  .kpi-lbl{font-size:9px!important}
  .form-cols{grid-template-columns:1fr!important}
  .btn-row{flex-direction:column}
  .btn-row .btn,.btn-row .btn-ol{width:100%;text-align:center;justify-content:center}
  table{font-size:11px}
  thead th{padding:5px 6px;font-size:9px}
  tbody td,tfoot td{padding:5px 6px}
  .c-bd{padding:9px}
  .c-hd{padding:9px 13px}
  .pg-ti{font-size:17px!important;margin-bottom:2px}
  .pg-ey{font-size:10px}
  .two-col{grid-template-columns:1fr!important}
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .print-modal-bg{padding:6px;align-items:flex-start}
  .print-modal{font-size:11px}
  .pm-actions{gap:5px;flex-wrap:wrap}
  .pm-actions button{font-size:11px!important;padding:7px 10px!important}
  .card{border-radius:6px;margin-bottom:10px}
  /* Force all inline grid styles to stack on mobile */
  .dash-row-2{grid-template-columns:1fr!important;display:grid!important}
  /* Target dashboard inline grids */
  [style*="grid-template-columns:'1.6fr 1fr'"]{grid-template-columns:1fr!important}
  [style*="grid-template-columns:'1fr 1.4fr'"]{grid-template-columns:1fr!important}
  /* KPI strip → 2 col */
  [style*="repeat(6,1fr)"]{grid-template-columns:1fr 1fr!important}
  [style*="repeat(3,1fr)"]{grid-template-columns:1fr 1fr!important}
  [style*="repeat(auto-fit"]{grid-template-columns:1fr 1fr!important}
}
@media(max-width:400px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .kpi-val{font-size:13px}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
/* ─── CRONOGRAMA IMPRIMIBLE ──────────────────── */
.print-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.print-modal{background:#fff;width:100%;max-width:780px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13px;color:#111}
.pm-header{background:linear-gradient(135deg,#0d2b1f 0%,#1B4F45 60%,#2d8a7a 100%);padding:28px 36px;position:relative;overflow:hidden}
.pm-header::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;border:1px solid rgba(184,151,58,.18)}
.pm-header::after{content:'';position:absolute;bottom:-30px;right:20px;width:120px;height:120px;border-radius:50%;border:1px solid rgba(184,151,58,.12)}
.pm-logo-row{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.pm-logo-circle{width:48px;height:48px;border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pm-brand{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:#fff;letter-spacing:-.01em;line-height:1}
.pm-brand em{color:#d4ac44;font-style:italic}
.pm-tagline{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.18em;text-transform:uppercase;margin-top:3px}
.pm-doc-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.2em;text-transform:uppercase;margin-top:14px}
.pm-doc-name{font-family:'Fraunces',serif;font-size:18px;color:#fff;font-weight:600;margin-top:2px}
.pm-info-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:2px solid #f0f0f0}
.pm-info-half{padding:16px 24px}
.pm-info-half:first-child{border-right:1px solid #f0f0f0}
.pm-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f7f7f7;font-size:12.5px}
.pm-row:last-child{border-bottom:none}
.pm-k{color:#777;font-weight:500}
.pm-v{font-weight:600;color:#111;text-align:right}
.pm-totals{display:grid;grid-template-columns:1fr 1fr;background:#0d2b1f}
.pm-tot{padding:14px 24px;text-align:center;border-right:1px solid rgba(255,255,255,.1)}
.pm-tot:last-child{border-right:none}
.pm-tot-lbl{font-size:9px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.15em;margin-bottom:4px}
.pm-tot-val{font-size:20px;font-weight:700;color:#fff;font-family:'Fraunces',serif}
.pm-table{width:100%;border-collapse:collapse;font-size:12px}
.pm-table thead tr{background:#f5f8f5}
.pm-table thead th{padding:9px 12px;text-align:center;font-weight:700;color:#444;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid #e0e8e0}
.pm-table thead th:first-child{text-align:center;width:36px}
.pm-table tbody td{padding:8px 12px;text-align:right;border-bottom:1px solid #f0f4f0;color:#333}
.pm-table tbody td:first-child{text-align:center;font-weight:700;color:#1B4F45;background:#f9fcf9}
.pm-table tbody td:nth-child(2){text-align:left}
.pm-table tbody tr:hover td{background:#f5fbf5}
.pm-table tfoot td{padding:9px 12px;text-align:right;background:#e8f0e8;font-weight:700;color:#1B4F45;border-top:2px solid #c0d4c0;font-size:11px}
.pm-table tfoot td:first-child{text-align:center}
.pm-footer{padding:16px 24px;border-top:2px solid #f0f0f0;display:flex;justify-content:space-between;align-items:flex-end;font-size:11px;color:#999}
.pm-firma{text-align:center}
.pm-firma-line{width:160px;border-top:1px solid #bbb;margin:0 auto 5px;padding-top:6px}
@media print{
  .print-modal-bg{position:static;background:none;padding:0}
  .print-modal{max-width:100%;box-shadow:none}
  .pm-actions{display:none!important}
}
</style>

// Fecha hoy como "2026-03-06"
const todayStr=()=>new Date().toISOString().split('T')[0];
// Parsear "dd/mm/yyyy" o "yyyy-mm-dd" a objeto Date seguro
const parseDate=s=>{
  if(!s)return null;
  if(s.includes('/'))return new Date(`${s.split('/')[2]}-${s.split('/')[1]}-${s.split('/')[0]}T12:00:00`);
  return new Date(s+'T12:00:00');
};
// Retorna "yyyy-mm-dd" desde partes
const buildDate=(d,m,y)=>`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

function sumarMeses(fechaISO,m){
  const b=new Date(fechaISO+'T12:00:00');
  let y=b.getFullYear(),mo=b.getMonth()+1,d=b.getDate();
  mo+=m;while(mo>12){mo-=12;y++;}
  const dm=new Date(y,mo,0).getDate();
  return`${y}-${String(mo).padStart(2,'0')}-${String(Math.min(d,dm)).padStart(2,'0')}`;
}
function getFV(base,n,tipo){
  if(tipo==='MENSUAL')return sumarMeses(base,n);
  const d=new Date(base+'T12:00:00');
  tipo==='SEMANAL'?d.setDate(d.getDate()+n*7+1):d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0];
}
// tasa aquí ya viene como decimal (0.06)
function calcInt(monto,tasa,tipo,cuotas){
  const m=N(monto),t=N(tasa),c=N(cuotas)||1;
  if(tipo==='MENSUAL')return m*t;
  if(tipo==='SEMANAL')return(m/c)*t;
  return(m*t)/30;
}

// ── Estado de cuota ───────────────────────────────────────────────
function getEst(r){
  const tp=(r.tipo_pago||'').toUpperCase().trim();
  if(tp==='SOLO INTERES')return'Solo int.';
  if(tp==='PAGO ADELANTADO')return'Adelantado';
  const pagado=N(r.monto_pagado);
  if(!pagado){
    const fv=new Date(r.fecha_vence+'T12:00:00'),hoy=new Date();
    hoy.setHours(0,0,0,0);
    return fv<hoy?'Vencido':'Pendiente';
  }
  return pagado>=N(r.cuota_base)?'Pagado':'Parcial';
}
function getSaldo(r){
  const tp=(r.tipo_pago||'').toUpperCase().trim();
  if(tp==='SOLO INTERES')return N(r.capital_cuota);
  const pagado=N(r.monto_pagado);
  if(!pagado)return N(r.cuota_base);
  return Math.max(0,N(r.cuota_base)-pagado);
}
function getEstPrestamo(cuotas){
  if(!cuotas.length)return'ACTIVO';
  const ests=cuotas.map(getEst);
  const pagadas=ests.filter(e=>e==='Pagado'||e==='Adelantado').length;
  if(pagadas>=cuotas.length)return'CANCELADO';
  if(ests.some(e=>e==='Vencido'))return'VENCIDO';
  if(pagadas>0)return'EN CURSO';
  return'ACTIVO';
}
function genCrono(loan,pid){
  const m=N(loan.monto),t=N(loan.tasa),c=N(loan.cuotas);
  const d=N(loan.desgravamen||0),go=N(loan.gasto_operativo||0);
  const cap=parseFloat((m/c).toFixed(2));
  const int=parseFloat(calcInt(m,t,loan.tipo,c).toFixed(2));
  const base=parseFloat((cap+int+d+go).toFixed(2));
  return Array.from({length:c},(_,i)=>({
    prestamo_id:pid,cliente:loan.cliente,n_cuota:i+1,
    fecha_vence:getFV(loan.fecha_prestamo,i+1,loan.tipo),
    capital_cuota:cap,interes_cuota:int,desgravamen:d,
    cuota_base:base,
    tipo_pago:'NORMAL',monto_pagado:null,mora:null,fecha_pago:null,
  }));
}

// ── Selector de fecha dd/mm/yyyy ───────────────────────────────────
function DatePicker({value,onChange,label}){
  // value es "yyyy-mm-dd"
  const[dd,mm,yy]=value?value.split('-').reverse():[String(new Date().getDate()).padStart(2,'0'),String(new Date().getMonth()+1).padStart(2,'0'),String(new Date().getFullYear())];
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const years=Array.from({length:10},(_,i)=>new Date().getFullYear()-2+i);
  const dias=Array.from({length:31},(_,i)=>String(i+1).padStart(2,'0'));
  function update(field,val){
    const cur=value||todayStr();
    const[cy,cm,cd]=cur.split('-');
    const nd=field==='d'?val:cd,nm=field==='m'?val:cm,ny=field==='y'?val:cy;
    onChange(buildDate(parseInt(nd),parseInt(nm),ny));
  }
  return(
    <div>
      {label&&<span className="lbl">{label}</span>}
      <div className="date-inp">
        <select value={dd} onChange={e=>update('d',e.target.value)}>
          {dias.map(d=><option key={d} value={d}>{d}</option>)}
        </select>
        <select value={mm} onChange={e=>update('m',e.target.value)}>
          {meses.map((m,i)=><option key={i} value={String(i+1).padStart(2,'0')}>{m}</option>)}
        </select>
        <select value={yy} onChange={e=>update('y',e.target.value)}>
          {years.map(y=><option key={y} value={y}>{y}</option>)}
        </select>
      </div>
    </div>
  );
}

// ── Donut Chart ────────────────────────────────────────────────────
function Donut({segs,total,cv,cl}){
  const r=42,cx=55,cy=55,circ=2*Math.PI*r;
  let off=0;
  return(
    <div className="donut-wrap">
      <svg viewBox="0 0 110 110" width="110" height="110" style={{transform:'rotate(-90deg)'}}>
        {segs.map((s,i)=>{
          const pct=total>0?s.v/total:0;
          const p=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.c} strokeWidth="11" strokeDasharray={`${circ*pct} ${circ*(1-pct)}`} strokeDashoffset={-off*circ}/>;
          off+=pct;return p;
        })}
      </svg>
      <div className="donut-center"><div className="donut-cv">{cv}</div><div className="donut-cl">{cl}</div></div>
    </div>
  );
}

function Login({onLogin}){
  const[username,setUsername]=useState('');

  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const[showPass,setShowPass]=useState(false);

  function submit(){
    setErr('');
    const u=username.trim();
    if(!u||!pass){setErr('Ingresa usuario y contraseña');return;}
    setLoading(true);
    setTimeout(()=>{
      const found=USUARIOS.find(x=>x.user.toLowerCase()===u.toLowerCase()&&x.pass===pass);
      if(found){
        // Store session in sessionStorage (clears on browser close)
        sessionStorage.setItem('csj_user',JSON.stringify(found));
        onLogin(found);
      } else {

      }
      setLoading(false);

        <div style={{textAlign:'center',marginBottom:28}}>

          </div>
          <div style={{fontFamily:"'Fraunces',serif",fontSize:24,fontWeight:700,color:'var(--dark)'}}>Crédito <em style={{color:'var(--teal)',fontStyle:'normal'}}>San Juan</em></div>
          <div style={{fontSize:11,color:'var(--grey)',letterSpacing:'.1em',textTransform:'uppercase',marginTop:4}}>Sistema de gestión</div>
        </div>
        <div style={{marginBottom:14}}>
          <span className="lbl">Usuario</span>
          <input className="inp" value={username} onChange={e=>setUsername(e.target.value)}
            placeholder="Tu usuario" onKeyDown={e=>e.key==='Enter'&&submit()}
            autoCapitalize="off" autoCorrect="off"/>
        </div>
        <div style={{marginBottom:20}}>
          <span className="lbl">Contraseña</span>
          <div style={{position:'relative'}}>
            <input className="inp" type={showPass?'text':'password'} value={pass}
              onChange={e=>setPass(e.target.value)} placeholder="••••••••"

            <button onClick={()=>setShowPass(p=>!p)}

              {showPass
                ?<svg viewBox="0 0 24 24" style={{width:16,height:16,stroke:'currentColor',fill:'none',strokeWidth:2,strokeLinecap:'round'}}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                :<svg viewBox="0 0 24 24" style={{width:16,height:16,stroke:'currentColor',fill:'none',strokeWidth:2,strokeLinecap:'round'}}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              }
            </button>
          </div>
        </div>
        {err&&<div style={{background:'#fde8e8',border:'1px solid #f5a5a5',borderRadius:6,padding:'9px 13px',color:'var(--red)',fontSize:13,fontWeight:600,marginBottom:14}}>{err}</div>}
        <button className="btn" style={{width:'100%',padding:'12px',fontSize:14,justifyContent:'center'}}

function App(){
  const[user,setUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);
  const[view,setView]=useState('dashboard');
  const[loans,setLoans]=useState([]);
  const[sched,setSched]=useState([]);
  const[loading,setLoading]=useState(false);
  const[saving,setSaving]=useState(false);
  const[payingRow,setPayingRow]=useState(null);
  const[viewLoan,setViewLoan]=useState(null);
  const[toast,setToast]=useState(null);
  const[mob,setMob]=useState(false);
  const[dbError,setDbError]=useState(null);// Error visible para debug

  useEffect(()=>{
    // Check sessionStorage for existing login
    try{
      const saved=sessionStorage.getItem('csj_user');
      if(saved){const u=JSON.parse(saved);setUser(u);}
    }catch(e){}
    setAuthLoading(false);
  },[]);
  useEffect(()=>{if(user)loadAll();},[user]);

  async function loadAll(){
    setLoading(true);setDbError(null);
    const[lr,sr]=await Promise.all([
      db.from('prestamos').select('*').order('created_at',{ascending:false}),
      db.from('cronograma').select('*').order('n_cuota',{ascending:true}),
    ]);
    if(lr.error){setDbError('Error cargando préstamos: '+lr.error.message);setLoading(false);return;}
    if(sr.error){setDbError('Error cargando cronograma: '+sr.error.message);setLoading(false);return;}
    setLoans(lr.data||[]);
    setSched(sr.data||[]);
    setLoading(false);
  }

  // Despierta Supabase antes de operaciones importantes
  async function pingDB(){
    await db.from('prestamos').select('id').limit(1);
  }

  const showToast=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),4500);};

  // Fetch con timeout configurable
  async function apiFetch(url,opts,timeoutMs=30000){
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),timeoutMs);
    try{
      const r=await fetch(url,{...opts,signal:ctrl.signal});
      clearTimeout(tid);
      return r;
    }catch(ex){
      clearTimeout(tid);
      if(ex.name==='AbortError')throw new Error('TIMEOUT: el servidor no respondió en '+Math.round(timeoutMs/1000)+'s');
      throw ex;
    }
  }

  async function crearPrestamo(data){
    setDbError(null);
    setSaving(true);

    const token=SKEY;
    const H={
      'Content-Type':'application/json',
      'apikey':SKEY,
      'Authorization':'Bearer '+token,
      'Prefer':'return=representation',
    };

    // 1. INSERT préstamo (timeout 30s)
    let loan=null;
    try{
      const r=await apiFetch(SURL+'/rest/v1/prestamos',{method:'POST',headers:H,
        body:JSON.stringify({
          cliente:data.cliente,garante:data.garante||'',
          referencia:data.referencia||'',
          cliente_externo:data.cliente_externo||data.clienteExterno||'NO',
          monto:N(data.monto),tasa:N(data.tasa),tipo:data.tipo,
          cuotas:N(data.cuotas),desgravamen:N(data.desgravamen||0),
          gasto_operativo:N(data.gasto_operativo||data.gastoOperativo||0),
          fecha_prestamo:data.fecha_prestamo||data.fechaPrestamo,
          creado_por_email:user.user||user.email||'',
        }),
      });
      const txt=await r.text();
      let json;try{json=JSON.parse(txt);}catch(e){json=null;}
      if(!r.ok){
        const msg='HTTP '+r.status+': '+(json?.message||json?.error||txt);
        setSaving(false);setDbError(msg);showToast(msg,'err');
        alert('❌ ERROR PRÉSTAMO:\n'+msg);return false;
      }
      loan=Array.isArray(json)?json[0]:json;
      if(!loan?.id){
        const msg='Sin ID en respuesta: '+JSON.stringify(json).substring(0,200);
        setSaving(false);setDbError(msg);alert('❌ ERROR: '+msg);return false;
      }
    }catch(ex){
      const msg=ex.message;
      setSaving(false);setDbError(msg);alert('❌ ERROR PRÉSTAMO:\n'+msg);return false;
    }

    // 2. INSERT cronograma (timeout 30s)
    // Normalizar: genCrono espera fecha_prestamo (snake) pero el form envía fechaPrestamo (camel)
    const dataParaCrono={...data, fecha_prestamo: data.fechaPrestamo||data.fecha_prestamo};
    const rows=genCrono(dataParaCrono,loan.id).map(r=>({
      prestamo_id:Number(loan.id),cliente:String(data.cliente),
      n_cuota:Number(r.n_cuota),fecha_vence:String(r.fecha_vence),
      capital_cuota:Number(r.capital_cuota),interes_cuota:Number(r.interes_cuota),
      desgravamen:Number(r.desgravamen),cuota_base:Number(r.cuota_base),
      tipo_pago:'NORMAL',monto_pagado:null,mora:null,fecha_pago:null,
    }));
    try{
      const r=await apiFetch(SURL+'/rest/v1/cronograma',{method:'POST',headers:H,body:JSON.stringify(rows)});
      const txt=await r.text();
      let json;try{json=JSON.parse(txt);}catch(e){json=null;}
      if(!r.ok){
        const msg='HTTP '+r.status+': '+(json?.message||json?.error||txt);
        setDbError(msg);
        alert('⚠ CRONOGRAMA: '+msg+' — Préstamo guardado ID:'+loan.id);
      }
    }catch(ex){
      setDbError(ex.message);
      alert('⚠ CRONOGRAMA: '+ex.message+' — Préstamo guardado ID:'+loan.id);
    }

    await loadAll();
    setSaving(false);
    showToast('✓ Préstamo guardado');
    return true;
  }

  async function registrarPago(rowId,pago){
    // Get the row to know the prestamo_id
    const row=sched.find(r=>r.id===rowId);
    if(!row){showToast('Error: cuota no encontrada','err');return;}

    if(pago.tipoPago==='CANCELAR PRÉSTAMO'){
      // Mark ALL pending cuotas of this loan as cancelled
      const pendientes=sched.filter(r=>r.prestamo_id===row.prestamo_id&&getSaldo(r)>0);
      // Pay the selected cuota with the entered amount + mora
      const updates=pendientes.map((r,i)=>({
        id:r.id,
        tipo_pago:'CANCELAR PRÉSTAMO',
        monto_pagado:r.id===rowId?N(pago.montoPagado):N(r.cuota_base),
        mora:r.id===rowId&&pago.mora?N(pago.mora):null,
        fecha_pago:pago.fechaPago,
      }));
      for(const u of updates){
        const{error}=await db.from('cronograma').update({
          tipo_pago:u.tipo_pago,monto_pagado:u.monto_pagado,
          mora:u.mora,fecha_pago:u.fecha_pago,
        }).eq('id',u.id);
        if(error){showToast('Error: '+error.message,'err');return;}
      }
      setSched(p=>p.map(r=>{
        const u=updates.find(x=>x.id===r.id);
        return u?{...r,tipo_pago:u.tipo_pago,monto_pagado:u.monto_pagado,mora:u.mora,fecha_pago:u.fecha_pago}:r;
      }));
      showToast('✓ Préstamo cancelado — '+updates.length+' cuotas cerradas');
    } else {
      // Normal single-cuota payment
      const{error}=await db.from('cronograma').update({
        tipo_pago:pago.tipoPago,
        monto_pagado:N(pago.montoPagado),
        mora:pago.mora?N(pago.mora):null,
        fecha_pago:pago.fechaPago,
      }).eq('id',rowId);
      if(error){showToast('Error: '+error.message,'err');return;}
      setSched(p=>p.map(r=>r.id===rowId?{...r,tipo_pago:pago.tipoPago,monto_pagado:N(pago.montoPagado),mora:pago.mora?N(pago.mora):null,fecha_pago:pago.fechaPago}:r));
      showToast('✓ Pago registrado');
    }
    setPayingRow(null);
  }

  async function pagarTodo(loanId,fechaPago){
    const pendientes=sched.filter(r=>r.prestamo_id===loanId&&getEst(r)!=='Pagado'&&getEst(r)!=='Adelantado');
    for(const r of pendientes){
      await db.from('cronograma').update({tipo_pago:'PAGO ADELANTADO',monto_pagado:N(r.cuota_base),mora:null,fecha_pago:fechaPago}).eq('id',r.id);
    }
    setSched(p=>p.map(r=>pendientes.find(x=>x.id===r.id)?{...r,tipo_pago:'PAGO ADELANTADO',monto_pagado:N(r.cuota_base),mora:null,fecha_pago:fechaPago}:r));
    showToast('✓ Préstamo cancelado — '+pendientes.length+' cuotas marcadas como pagadas');
  }

  async function eliminarPrestamo(id){
    if(!confirm('¿Eliminar este préstamo y su cronograma? No se puede deshacer.'))return;
    await db.from('prestamos').delete().eq('id',id);
    setLoans(p=>p.filter(l=>l.id!==id));
    setSched(p=>p.filter(r=>r.prestamo_id!==id));
    showToast('Préstamo eliminado');
  }

  function goTo(v){setView(v);setMob(false);if(v!=='schedule')setViewLoan(null);if(v!=='payments')setPayingRow(null);}

  if(authLoading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh'}}><Spin/></div>;
  if(!user)return<Login onLogin={setUser}/>;

  const nav=[{id:'dashboard',ic:'dash',lbl:'Dashboard'},{id:'newLoan',ic:'plus',lbl:'Nuevo préstamo'},{id:'loans',ic:'list',lbl:'Préstamos'},{id:'schedule',ic:'cal',lbl:'Cronograma'},{id:'payments',ic:'pay',lbl:'Registrar pago'},{id:'export',ic:'trend',lbl:'Exportar Excel'}];

  const SBC=()=>(
    <>
      <div className="sb-hd">
        <div className="sb-em"><svg viewBox="0 0 24 24" style={{width:16,height:16}}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="var(--gold)" stroke="none"/><polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="rgba(0,0,0,.4)" strokeWidth="1.5"/></svg></div>
        <div className="sb-brand">Crédito <em>San Juan</em></div>
        <div className="sb-tag">Gestión financiera</div>
      </div>
      <div className="sb-div"/>
      <div className="sb-nav">
        <div className="sb-sec">Menú</div>
        {nav.map(n=><div key={n.id} className={`nl${view===n.id?' on':''}`} onClick={()=>goTo(n.id)}><div className="nl-ic">{IC[n.ic]}</div>{n.lbl}</div>)}
      </div>
      <div className="sb-ft">
        <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:9}}>
          <div className="sb-av">{user.email[0].toUpperCase()}</div>
          <div className="sb-email" style={{color:'rgba(255,255,255,.6)',fontSize:12,fontWeight:500}}>{user.user||user.email}</div>
        <div style={{fontSize:9.5,color:'rgba(255,255,255,.3)',letterSpacing:'.1em',textTransform:'uppercase',marginTop:2}}>{user.rol||'usuario'}</div>
        </div>
        <button className="btn-lo" onClick={()=>{sessionStorage.removeItem('csj_user');setUser(null);}}>Cerrar sesión</button>
      </div>
    </>
  );

  return(
    <div className="shell">
      <div className="sb"><SBC/></div>
      {mob&&<><div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.42)',zIndex:199}} onClick={()=>setMob(false)}/><div className="sb open"><SBC/></div></>}
      <div className="main">
        <div className="mob-bar">
          <button onClick={()=>setMob(true)} style={{background:'rgba(255,255,255,.12)',border:'none',color:'#fff',borderRadius:6,padding:'6px 12px',fontSize:13,cursor:'pointer'}}>☰</button>
          <span style={{fontFamily:"'Fraunces',serif",color:'#fff',fontSize:15,fontWeight:700}}>Crédito San Juan</span>
          <div style={{width:40}}/>
        </div>
        {(loading||saving)&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:998,background:'rgba(13,31,13,.55)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{background:'#fff',borderRadius:14,padding:'32px 40px',textAlign:'center',boxShadow:'0 12px 40px rgba(0,0,0,.25)',maxWidth:360}}>
            <div style={{width:40,height:40,border:'3px solid #d4ede5',borderTop:'3px solid var(--teal2)',borderRadius:'50%',animation:'spin .9s linear infinite',margin:'0 auto 16px'}}/>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:17,fontWeight:700,color:'var(--ink)',marginBottom:8}}>{saving?'Guardando préstamo...':'Cargando datos...'}</div>
            <div style={{fontSize:12.5,color:'var(--grey)',lineHeight:1.6}}>{saving?'Esto puede tomar hasta 2 minutos. No cierres la página.':'Conectando con Supabase...'}</div>
            {saving&&<div style={{marginTop:16,fontSize:11,color:'#aaa'}}>Supabase Free inicia en frío — normal en primera operación del día</div>}
          </div>
        </div>}
        <div className="page">
          {dbError&&(
            <div className="err-box">
              <strong>⚠ Error de base de datos — ejecuta el SQL de permisos en Supabase</strong>
              {dbError}
            </div>
          )}
          {view==='dashboard'&&<Dashboard loans={loans} sched={sched} goTo={goTo} setPayingRow={setPayingRow}/>}
          {view==='newLoan'  &&<NuevoPrestamo onCreate={crearPrestamo}/>}
          {view==='loans'   &&<Prestamos loans={loans} sched={sched} onDelete={eliminarPrestamo} onVer={l=>{setViewLoan(l);goTo('schedule');}} onPagar={r=>{setPayingRow(r);goTo('payments');}}/>}
          {view==='schedule'&&<Cronograma loans={loans} sched={sched} viewLoan={viewLoan} onPagar={r=>{setPayingRow(r);goTo('payments');}}/>}
          {view==='payments'&&<RegistrarPago loans={loans} sched={sched} payingRow={payingRow} onPay={registrarPago} onPagarTodo={pagarTodo}/>}
          {view==='export'   &&<ExportarExcel loans={loans} sched={sched}/>}
        </div>
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

/* ══ DASHBOARD ══════════════════════════════════════════════════ */
function Dashboard({loans,sched,goTo,setPayingRow}){
  const venc=sched.filter(r=>getEst(r)==='Vencido');
  const totPres=loans.reduce((a,l)=>a+N(l.monto),0);
  const totCob=sched.filter(r=>r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
  const montoVenc=venc.reduce((a,r)=>a+getSaldo(r),0);
  const porCobrar=sched.filter(r=>!['Pagado','Adelantado'].includes(getEst(r))).reduce((a,r)=>a+getSaldo(r),0);
  const nPag=sched.filter(r=>['Pagado','Adelantado'].includes(getEst(r))).length;
  const nPend=sched.filter(r=>getEst(r)==='Pendiente').length;
  const nVenc=venc.length;
  const totInt=sched.reduce((a,r)=>a+N(r.interes_cuota),0);
  const totMora=sched.reduce((a,r)=>a+N(r.mora||0),0);
  const total=sched.length||1;

  // Last 7 months data
  const meses=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setMonth(d.getMonth()-(6-i));
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const lbl=['En','Fe','Ma','Ab','My','Jn','Jl','Ag','Se','Oc','No','Di'][d.getMonth()];
    const cob=sched.filter(r=>r.fecha_pago?.substring(0,7)===key).reduce((a,r)=>a+N(r.monto_pagado),0);
    const pre=loans.filter(l=>l.fecha_prestamo?.substring(0,7)===key).reduce((a,l)=>a+N(l.monto),0);
    const mor=sched.filter(r=>r.fecha_pago?.substring(0,7)===key).reduce((a,r)=>a+N(r.mora||0),0);
    return{lbl,cob,pre,mor};
  });
  const maxM=Math.max(...meses.map(m=>Math.max(m.cob,m.pre)),1);

  // Trend line points for cobrado
  const W=460,H=90,pad=8;
  const pts=meses.map((m,i)=>{
    const x=pad+(i/(meses.length-1))*(W-pad*2);
    const y=H-pad-(m.cob/maxM)*(H-pad*2);
    return[x,y];
  });
  const polyline=pts.map(p=>p.join(',')).join(' ');
  const area=`M${pts[0][0]},${H-pad} `+pts.map(p=>`L${p[0]},${p[1]}`).join(' ')+` L${pts[pts.length-1][0]},${H-pad} Z`;

  // Top clients by monto prestado
  const byClient={};
  loans.forEach(l=>{if(!byClient[l.cliente])byClient[l.cliente]=0;byClient[l.cliente]+=N(l.monto);});
  const topClients=Object.entries(byClient).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const maxCli=topClients[0]?topClients[0][1]:1;

  const D='#1B4F45'; const T='#2d8a7a'; const T2='#379F8B'; const M='#d4ede5';

  const kpis=[
    {l:'Capital prestado', v:fmt(totPres),  sub:loans.length+' préstamos',  bg:'#1B4F45', tc:'#fff',    sc:'rgba(255,255,255,.55)'},
    {l:'Total cobrado',    v:fmt(totCob),   sub:nPag+' cuotas pagadas',    bg:'#2d8a7a', tc:'#fff',    sc:'rgba(255,255,255,.55)'},
    {l:'Por cobrar',       v:fmt(porCobrar),sub:nPend+' cuotas pendientes',bg:'#e8f0e8', tc:'#1B4F45', sc:'#5a7a5a'},
    {l:'Monto vencido',    v:fmt(montoVenc),sub:nVenc+' cuotas vencidas',  bg:'#fde8e8', tc:'#b52a2a', sc:'#c97070'},
    {l:'Mora acumulada',   v:fmt(totMora),  sub:'mora registrada',          bg:'#fff5e6', tc:'#a0620a', sc:'#c09050'},
    {l:'Interés generado', v:fmt(totInt),   sub:'sobre capital total',      bg:'#e4f4f0', tc:'#1B6B5A', sc:'#5a8a80'},
  ];

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      {/* PAGE TITLE */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <div>
          <div className="pg-ey">Panel de control</div>
          <div className="pg-ti">Dashboard <span style={{color:T,fontWeight:400}}>Financiero</span></div>
        </div>
        <div style={{fontSize:12,color:'var(--grey)',background:'var(--white)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 14px',alignSelf:'flex-end'}}>
          {new Date().toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
        </div>
      </div>

      {/* KPI STRIP */}
      <div className='kpi-grid' style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10,marginBottom:14}}>
        {kpis.map((k,i)=>(
          <div key={i} style={{background:k.bg,borderRadius:6,padding:'14px 16px',border:'1px solid rgba(0,0,0,.06)'}}>
            <div style={{fontSize:9.5,fontWeight:700,color:k.sc,textTransform:'uppercase',letterSpacing:'.09em',marginBottom:6}}>{k.l}</div>
            <div style={{fontSize:19,fontWeight:700,color:k.tc,letterSpacing:'-.02em',lineHeight:1,marginBottom:4}}>{k.v}</div>
            <div style={{fontSize:10.5,color:k.sc}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* CHARTS ROW */}
      <div className='dash-row-2' className='dash-row-2' style={{display:'grid',gridTemplateColumns:'1.6fr 1fr',gap:12,marginBottom:12}}>

        {/* TENDENCIA DE COBROS */}
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 18px 0'}}>
            <div style={{fontWeight:700,fontSize:13.5,color:'var(--ink)'}}>Tendencia de cobros</div>
            <div style={{display:'flex',gap:14,fontSize:11}}>
              <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:10,borderRadius:2,background:T2,display:'inline-block'}}/> Cobrado</span>
              <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:10,borderRadius:2,background:D,opacity:.35,display:'inline-block'}}/> Prestado</span>
            </div>
          </div>
          <div style={{padding:'10px 18px 14px'}}>
            <svg viewBox={`0 0 ${W} ${H+20}`} style={{width:'100%',height:120}}>
              <defs>
                <linearGradient id="areGrad" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stopColor={T2} stopOpacity="0.25"/>
                  <stop offset="100%" stopColor={T2} stopOpacity="0.02"/>
                </linearGradient>
              </defs>
              {/* Grid lines */}
              {[0,1,2,3].map(i=>(
                <line key={i} x1={pad} x2={W-pad} y1={pad+(i/3)*(H-pad*2)}
                  stroke="#e8f0e8" strokeWidth="1"/>
              ))}
              {/* Prestado bars */}
              {meses.map((m,i)=>{
                const bw=28;
                const x=pad+(i/(meses.length-1))*(W-pad*2)-bw/2;
                const h=maxM>0?(m.pre/maxM)*(H-pad*2):0;
                return<rect key={i} x={x} y={H-pad-h} width={bw} height={h} rx="2" fill={D} opacity="0.18"/>;
              })}
              {/* Cobrado area */}
              <path d={area} fill="url(#areGrad)"/>
              {/* Cobrado line */}
              <polyline points={polyline} fill="none" stroke={T2} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
              {/* Dots */}
              {pts.map(([x,y],i)=>(
                <circle key={i} cx={x} cy={y} r="3.5" fill="#fff" stroke={T2} strokeWidth="2"/>
              ))}
              {/* X labels */}
              {meses.map((m,i)=>{
                const x=pad+(i/(meses.length-1))*(W-pad*2);
                return<text key={i} x={x} y={H+14} textAnchor="middle" fontSize="9" fill="var(--grey)">{m.lbl}</text>;
              })}
            </svg>
          </div>
        </div>

        {/* ESTADO CUOTAS */}
        <div className="card">
          <div style={{padding:'13px 18px 0',fontWeight:700,fontSize:13.5,color:'var(--ink)',marginBottom:10}}>Estado de cuotas</div>
          <div style={{padding:'0 18px 14px',display:'flex',gap:16,alignItems:'center'}}>
            <Donut segs={[{v:nPag,c:T},{v:nPend,c:'#2356a0'},{v:nVenc,c:'#b52a2a'}]} total={total} cv={sched.length} cl="cuotas"/>
            <div style={{flex:1,display:'grid',gap:10}}>
              {[
                {l:'Pagadas',   n:nPag,  c:T,         pct:total>0?Math.round(nPag/total*100):0},
                {l:'Pendientes',n:nPend, c:'#2356a0',  pct:total>0?Math.round(nPend/total*100):0},
                {l:'Vencidas',  n:nVenc, c:'#b52a2a',  pct:total>0?Math.round(nVenc/total*100):0},
              ].map(i=>(
                <div key={i.l}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3,fontSize:12}}>
                    <span style={{color:i.c,fontWeight:600,display:'flex',alignItems:'center',gap:5}}>
                      <span style={{width:8,height:8,background:i.c,display:'inline-block',borderRadius:1}}/>
                      {i.l}
                    </span>
                    <span style={{fontWeight:700,color:'var(--ink)'}}>{i.n} <span style={{color:'var(--grey)',fontWeight:400,fontSize:11}}>({i.pct}%)</span></span>
                  </div>
                  <div style={{background:'#eef3ee',borderRadius:2,height:5}}>
                    <div style={{background:i.c,borderRadius:2,height:5,width:i.pct+'%',transition:'width .4s ease'}}/>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* SECOND ROW */}
      <div className='dash-row-2' className='dash-row-2' style={{display:'grid',gridTemplateColumns:'1fr 1.4fr',gap:12,marginBottom:12}}>

        {/* TOP CLIENTES */}
        <div className="card">
          <div style={{padding:'13px 18px 10px',fontWeight:700,fontSize:13.5,color:'var(--ink)'}}>Top clientes — capital</div>
          <div style={{padding:'0 18px 14px',display:'grid',gap:8}}>
            {topClients.length===0&&<div style={{color:'var(--grey)',fontSize:13,padding:'8px 0'}}>Sin datos</div>}
            {topClients.map(([cli,monto],i)=>{
              const pct=Math.round(monto/maxCli*100);
              const colors=[T,T2,'#56b0a0','#7ecabc'];
              return(
                <div key={cli}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:12}}>
                    <span style={{display:'flex',alignItems:'center',gap:7}}>
                      <span style={{width:8,height:8,borderRadius:1,background:colors[i],display:'inline-block'}}/>
                      <span style={{color:'var(--ink)',fontWeight:500}}>{cli}</span>
                    </span>
                    <span style={{fontWeight:700,color:D}}>{fmt(monto)}</span>
                  </div>
                  <div style={{background:'#eef3ee',borderRadius:2,height:6}}>
                    <div style={{background:colors[i],borderRadius:2,height:6,width:pct+'%',transition:'width .5s ease'}}/>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{borderTop:'1px solid var(--border)',padding:'10px 18px',display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--grey)'}}>
            <span>Total capital prestado</span>
            <span style={{fontWeight:700,color:D}}>{fmt(totPres)}</span>
          </div>
        </div>

        {/* BALANCE */}
        <div className="card">
          <div style={{padding:'13px 18px 10px',fontWeight:700,fontSize:13.5,color:'var(--ink)'}}>Balance del negocio</div>
          <div style={{padding:'0 18px 14px',display:'grid',gap:1}}>
            {[
              {l:'Capital prestado',    c:D,           v:totPres},
              {l:'Capital cobrado',     c:T,           v:totCob},
              {l:'En calle (saldo)',     c:'#a0620a',   v:Math.max(0,totPres-totCob)},
              {l:'Interés generado',    c:T2,          v:totInt},
              {l:'Mora acumulada',      c:'#b52a2a',   v:totMora},
            ].map((row,i)=>{
              const pct=totPres>0?Math.min(100,Math.round(row.v/totPres*100)):0;
              return(
                <div key={row.l} style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10,alignItems:'center',padding:'7px 0',borderBottom:i<4?'1px solid var(--border)':'none'}}>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4,fontSize:12.5}}>
                      <span style={{width:8,height:8,borderRadius:1,background:row.c,display:'inline-block'}}/>
                      <span style={{color:'#555'}}>{row.l}</span>
                    </div>
                    <div style={{background:'#eef3ee',borderRadius:2,height:5}}>
                      <div style={{background:row.c,borderRadius:2,height:5,width:pct+'%',opacity:.7}}/>
                    </div>
                  </div>
                  <div style={{fontWeight:700,color:row.c,fontSize:13,whiteSpace:'nowrap'}}>{fmt(row.v)}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* VENCIDOS */}
      {venc.length>0&&(
        <div className="card" style={{marginBottom:12,border:'1px solid #f5a5a5'}}>
          <div className="c-hd" style={{background:'#fde8e8',borderBottom:'1px solid #f5a5a5'}}>
            <div className="c-dot" style={{background:'var(--red)'}}/>
            <div className="c-hd-t" style={{color:'var(--red)'}}>⚠ Cuotas vencidas — acción requerida ({venc.length})</div>
          </div>
          <div className="tbl-wrap"><table>
            <thead><tr><th>Cliente</th><th>N° Cuota</th><th>Venció el</th><th>Cuota base</th><th>Saldo</th><th></th></tr></thead>
            <tbody>{venc.slice(0,6).map((r,i)=>(
              <tr key={i}>
                <td style={{fontWeight:600}}>{r.cliente}</td>
                <td style={{color:'var(--grey)'}}>{r.n_cuota}</td>
                <td style={{color:'var(--red)',fontWeight:600,fontSize:12}}>{fmtD(r.fecha_vence)}</td>
                <td>{fmt(r.cuota_base)}</td>
                <td style={{fontWeight:700,color:'var(--red)'}}>{fmt(getSaldo(r))}</td>
                <td><button className="btn btn-sm" onClick={()=>{setPayingRow(r);goTo('payments');}}>Cobrar</button></td>
              </tr>
            ))}</tbody>
          </table></div>
        </div>
      )}


    </div>
  );
}

function NuevoPrestamo({onCreate}){
  const[f,setF]=useState({
    cliente:'',garante:'',referencia:'',clienteExterno:'NO',
    monto:'',tasaPct:'6',tipo:'MENSUAL',cuotas:'',
    desgravamen:'0',gastoOperativo:'0',
    fechaPrestamo:todayStr(),
  });
  const[showPrev,setShowPrev]=useState(false);
  const[saving,setSaving]=useState(false);
  const[dbErr,setDbErr]=useState('');
  const s=(k,v)=>setF(p=>({...p,[k]:v}));

  const D='#1B4F45';
  const m=N(f.monto),t=N(f.tasaPct)/100,c=N(f.cuotas),d=N(f.desgravamen),go=N(f.gastoOperativo||0);
  const ok=m>0&&t>0&&c>0&&f.cliente.trim()&&f.tipo;

  // Build preview loan + rows using same genCrono
  const prevLoan=ok?{
    id:'BORRADOR',cliente:f.cliente,garante:f.garante||'',referencia:f.referencia||'',
    cliente_externo:f.clienteExterno||'NO',monto:m,tasa:t,tipo:f.tipo,cuotas:c,
    desgravamen:d,gasto_operativo:go,fecha_prestamo:f.fechaPrestamo,
    creado_por_email:'',
  }:null;
  const prevRows=React.useMemo(()=>{
    if(!prevLoan)return[];
    try{
      return genCrono({...prevLoan,fecha_prestamo:f.fechaPrestamo},'BORRADOR').map((r,i)=>({
        id:'prev_'+i,prestamo_id:'BORRADOR',cliente:f.cliente,
        n_cuota:r.n_cuota,fecha_vence:r.fecha_vence,
        capital_cuota:r.capital_cuota,interes_cuota:r.interes_cuota,
        desgravamen:r.desgravamen,gasto_operativo:r.gasto_operativo||0,
        cuota_base:r.cuota_base,tipo_pago:'NORMAL',
        monto_pagado:null,mora:null,fecha_pago:null,
      }));
    }catch(e){return[];}
  },[f.cliente,f.fechaPrestamo,m,t,c,d,go,f.tipo]);

  async function crearPrestamo(){
    if(!ok){setDbErr('Completa todos los campos requeridos');return;}
    setSaving(true);setDbErr('');
    const data={
      cliente:f.cliente.trim(),garante:f.garante.trim()||null,
      referencia:f.referencia.trim()||null,cliente_externo:f.clienteExterno,
      monto:m,tasa:t,tipo:f.tipo,cuotas:c,
      desgravamen:d,gasto_operativo:go,
      fecha_prestamo:f.fechaPrestamo,
    };
    try{await onCreate(data);}catch(ex){setDbErr(ex.message);}
    setSaving(false);
  }

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      {showPrev&&prevLoan&&<CronogramaModal loan={prevLoan} rows={prevRows} onClose={()=>setShowPrev(false)} isBorrador={true}/>}
      {saving&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:400,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{background:'#fff',borderRadius:10,padding:'32px 40px',textAlign:'center',boxShadow:'0 12px 40px rgba(0,0,0,.25)',maxWidth:320}}>
          <div style={{width:36,height:36,border:'3px solid var(--mint)',borderTop:'3px solid var(--teal2)',borderRadius:'50%',animation:'spin .9s linear infinite',margin:'0 auto 16px'}}/>
          <div style={{fontWeight:700,fontSize:15,color:'var(--ink)',marginBottom:6}}>Guardando préstamo...</div>
          <div style={{fontSize:12,color:'var(--grey)'}}>No cierres la página</div>
        </div>
      </div>}

      <div><div className="pg-ey">Operaciones</div><div className="pg-ti">Nuevo Préstamo</div><div className="pg-su">Completa los datos y usa Vista previa para revisar el cronograma antes de guardar.</div></div>

      <div className="card">

            <div><span className="lbl">Tasa de interés *</span>
              <div style={{position:'relative'}}>
                <input className="inp" type="number" value={f.tasaPct} onChange={e=>s('tasaPct',e.target.value)} style={{paddingRight:32}}/>

              </div>
              <div style={{fontSize:11,color:'var(--grey)',marginTop:3}}>Escribe 6 para 6% mensual</div>
            </div>
            <div><span className="lbl">N° Cuotas *</span><input className="inp" type="number" value={f.cuotas} onChange={e=>s('cuotas',e.target.value)} placeholder="0"/></div>
            <div><span className="lbl">Tipo de cronograma</span>
              <select className="inp" value={f.tipo} onChange={e=>s('tipo',e.target.value)}>
                {['MENSUAL','SEMANAL','DIARIO'].map(t=><option key={t}>{t}</option>)}

          <div className="sec-tag">Fecha y seguros</div>
          <div style={{display:'grid',gap:11,marginBottom:20}}>
            <div>

              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {[...Array(31)].map((_,i)=>({v:String(i+1).padStart(2,'0'),l:String(i+1)}))}
                <select className="inp" style={{width:'auto',minWidth:70}} value={f.fechaPrestamo.split('-')[2]||'01'}
                  onChange={e=>{const[y,mo]=f.fechaPrestamo.split('-');s('fechaPrestamo',`${y}-${mo}-${e.target.value}`);}}>

                <select className="inp" style={{width:'auto',minWidth:110}} value={f.fechaPrestamo.split('-')[1]||'01'}
                  onChange={e=>{const[y,,d]=f.fechaPrestamo.split('-');s('fechaPrestamo',`${y}-${e.target.value}-${d}`);}}>

                </select>
                <select className="inp" style={{width:'auto',minWidth:80}} value={f.fechaPrestamo.split('-')[0]||'2026'}
                  onChange={e=>{const[,mo,d]=f.fechaPrestamo.split('-');s('fechaPrestamo',`${e.target.value}-${mo}-${d}`);}}>
                  {[2024,2025,2026,2027,2028].map(y=><option key={y}>{y}</option>)}

              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}} className="form-cols">
              <div>
                <span className="lbl">Desgravamen / cuota (S/.)</span>
                <input className="inp" type="number" value={f.desgravamen} onChange={e=>s('desgravamen',e.target.value)} placeholder="0"/>
                <div style={{fontSize:11,color:'var(--grey)',marginTop:3}}>Seguro de vida por cuota</div>
              </div>
              <div>
                <span className="lbl">Gasto operativo / cuota (S/.)</span>
                <input className="inp" type="number" value={f.gastoOperativo} onChange={e=>s('gastoOperativo',e.target.value)} placeholder="0"/>
                <div style={{fontSize:11,color:'var(--grey)',marginTop:3}}>Cargo administrativo por cuota</div>
              </div>
            </div>
          </div>

          {ok&&(()=>{
            const cap=m/c,int_=f.tipo==='MENSUAL'?m*t:f.tipo==='SEMANAL'?(m/c)*t:m*t/30;
            const cota=parseFloat((cap+int_+d+go).toFixed(2)),total=parseFloat((cota*c).toFixed(2));
            return(
              <div style={{background:'var(--light)',borderRadius:6,padding:'14px 16px',marginBottom:16,border:'1px solid var(--border)'}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--grey)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>Resumen calculado</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  {[['Capital / cuota',fmt(cap)],['Interés / cuota ('+f.tasaPct+'%)',fmt(int_)],['Desgravamen',fmt(d)],['Gasto operativo',fmt(go)]].map(([k,v])=>(
                    <div key={k}><div style={{fontSize:11,color:'var(--grey)'}}>{k}</div><div style={{fontWeight:600,color:'var(--ink)',fontSize:13}}>{v}</div></div>
                  ))}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:12}}>
                  <div style={{background:D,borderRadius:6,padding:'10px 14px',textAlign:'center'}}>
                    <div style={{fontSize:9,color:'rgba(255,255,255,.5)',textTransform:'uppercase',letterSpacing:'.15em',marginBottom:4}}>CUOTA TOTAL</div>
                    <div style={{fontSize:20,fontWeight:700,color:'#fff',letterSpacing:'-.02em'}}>{fmt(cota)}</div>
                  </div>
                  <div style={{background:D,borderRadius:6,padding:'10px 14px',textAlign:'center'}}>
                    <div style={{fontSize:9,color:'rgba(255,255,255,.5)',textTransform:'uppercase',letterSpacing:'.15em',marginBottom:4}}>MONTO FINAL</div>
                    <div style={{fontSize:20,fontWeight:700,color:'#fff',letterSpacing:'-.02em'}}>{fmt(total)}</div>
                  </div>
                </div>
              </div>
            );
          })()}

          {dbErr&&<div style={{padding:'10px 14px',background:'#fde8e8',border:'1px solid #f5a5a5',borderRadius:6,color:'var(--red)',fontSize:13,fontWeight:600,marginBottom:12}}>{dbErr}</div>}
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}} className="btn-row">
            <button className="btn" disabled={saving||!ok} onClick={crearPrestamo}>✓ Ejecutar — Guardar</button>
            <button className="btn-ol" disabled={!ok} onClick={()=>setShowPrev(true)}>
              <svg viewBox="0 0 24 24" style={{width:13,height:13,stroke:'currentColor',fill:'none',strokeWidth:2,strokeLinecap:'round',display:'inline',marginRight:5}}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              Vista previa
            </button>
            <button className="btn-ol btn-sm" style={{fontSize:11,color:'var(--grey)'}} onClick={async()=>{
                const token=SKEY;
                const H={'Content-Type':'application/json','apikey':SKEY,'Authorization':'Bearer '+token,'Prefer':'return=representation'};
                let log='=== DIAGNÓSTICO DB ===';
                try{const r=await apiFetch(SURL+'/rest/v1/prestamos?limit=1',{headers:H},8000);log+=' | SELECT:'+r.status;}catch(ex){log+=' | SELECT FALLO:'+ex.message;}
                let testId=null;
                try{const r=await apiFetch(SURL+'/rest/v1/prestamos',{method:'POST',headers:H,body:JSON.stringify({cliente:'__TEST__',monto:1,tasa:0.01,tipo:'MENSUAL',cuotas:1,fecha_prestamo:'2026-01-01',creado_por_email:'test@test.com'})},10000);const txt=await r.text();log+=' | INSERT-P:'+r.status;if(r.ok){const j=JSON.parse(txt);testId=(Array.isArray(j)?j[0]:j)?.id;}}catch(ex){log+=' | INSERT-P FALLO:'+ex.message;}
                if(testId){
                  try{const r=await apiFetch(SURL+'/rest/v1/cronograma',{method:'POST',headers:H,body:JSON.stringify([{prestamo_id:testId,cliente:'__TEST__',n_cuota:1,fecha_vence:'2026-01-01',capital_cuota:1,interes_cuota:0.01,desgravamen:0,cuota_base:1.01,tipo_pago:'NORMAL'}])},10000);log+=' | INSERT-C:'+r.status;if(!r.ok){const t=await r.text();log+='('+t.substring(0,60)+')';}}catch(ex){log+=' | INSERT-C FALLO:'+ex.message;}
                  await fetch(SURL+'/rest/v1/cronograma?prestamo_id=eq.'+testId,{method:'DELETE',headers:H});
                  await fetch(SURL+'/rest/v1/prestamos?id=eq.'+testId,{method:'DELETE',headers:H});
                }
                alert(log);
              }}>Diag DB</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ PRÉSTAMOS ══════════════════════════════════════════════════ */
function Prestamos({loans,sched,onDelete,onVer,onPagar}){
  const[q,setQ]=useState('');
  const fl=loans.filter(l=>l.cliente.toLowerCase().includes(q.toLowerCase())||String(l.id).includes(q));
  const cob=id=>sched.filter(r=>r.prestamo_id===id&&r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
  const sig=id=>sched.filter(r=>r.prestamo_id===id&&!['Pagado','Adelantado'].includes(getEst(r))).sort((a,b)=>a.n_cuota-b.n_cuota)[0];
  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div><div className="pg-ey">Portafolio</div><div className="pg-ti">Préstamos</div></div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,marginBottom:13,flexWrap:'wrap'}}>
        <span style={{fontSize:13,color:'var(--grey)'}}>{fl.length} préstamo{fl.length!==1?'s':''}</span>
        <input className="inp" placeholder="Buscar cliente o ID..." value={q} onChange={e=>setQ(e.target.value)} style={{width:220}}/>
      </div>
      <div className="card"><div className="tbl-wrap"><table>
        <thead><tr><th>ID</th><th>Cliente / Garante</th><th>Monto</th><th>Tipo / Tasa</th><th>Cuotas</th><th>Progreso</th><th>Cobrado / Saldo</th><th>Inicio</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody>
          {fl.length===0&&<tr><td colSpan={10} style={{textAlign:'center',padding:44,color:'var(--grey)'}}>No se encontraron préstamos</td></tr>}
          {fl.map(l=>{
            const cuotas=sched.filter(r=>r.prestamo_id===l.id);
            const est=getEstPrestamo(cuotas);
            const s2=sig(l.id);
            return<tr key={l.id}>{(()=>{
              const pagadas=cuotas.filter(r=>['Pagado','Adelantado'].includes(getEst(r))).length;
              const saldo=cuotas.reduce((a,r)=>a+getSaldo(r),0);
              const cobrado=cob(l.id);
              const pct=l.cuotas>0?Math.round(pagadas/l.cuotas*100):0;
              return(<>
              <td style={{color:'var(--grey)',fontSize:11,fontWeight:600,whiteSpace:'nowrap'}}>#{l.id}</td>
              <td style={{minWidth:140}}>
                <div style={{fontWeight:700,color:'var(--ink)',fontSize:13}}>{l.cliente}</div>
                {l.garante&&<div style={{fontSize:11,color:'var(--grey)',marginTop:1}}>Gar: {l.garante}</div>}
                {l.referencia&&<div style={{fontSize:10.5,color:'var(--teal)',marginTop:1}}>Ref: {l.referencia}</div>}
              </td>
              <td style={{fontWeight:700,color:'var(--dark)',whiteSpace:'nowrap'}}>{fmt(l.monto)}</td>
              <td>
                <span style={{fontSize:10,background:'var(--light)',color:'var(--dark)',borderRadius:4,padding:'2px 7px',fontWeight:700,display:'block',marginBottom:3}}>{l.tipo}</span>
                <span style={{fontSize:11,color:'var(--grey)',fontWeight:600}}>{(N(l.tasa)*100).toFixed(1)}%</span>
              </td>
              <td style={{textAlign:'center'}}>
                <div style={{fontWeight:700,fontSize:13,color:'var(--dark)'}}>{pagadas}<span style={{color:'var(--grey)',fontWeight:400}}>/{l.cuotas}</span></div>
                <div style={{fontSize:9.5,color:'var(--grey)',letterSpacing:'.05em'}}>pagadas</div>
              </td>
              <td style={{minWidth:90}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{flex:1,height:5,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                    <div style={{height:'100%',width:pct+'%',background:pct===100?'var(--green)':'var(--teal2)',borderRadius:3,transition:'width .3s'}}/>
                  </div>
                  <span style={{fontSize:10.5,fontWeight:700,color:pct===100?'var(--green)':'var(--grey)',minWidth:28}}>{pct}%</span>
                </div>
              </td>
              <td style={{minWidth:110}}>
                <div style={{fontWeight:700,color:'var(--green)',fontSize:12}}>{fmt(cobrado)}</div>
                <div style={{fontSize:11,color:saldo>0?'var(--red)':'var(--grey)',fontWeight:saldo>0?600:400}}>Saldo: {fmt(saldo)}</div>
              </td>
              <td style={{color:'var(--grey)',fontSize:11,whiteSpace:'nowrap'}}>{fmtD(l.fecha_prestamo)}</td>
              <td><Badge s={est}/></td>
              </>);})()}
              <td><div style={{display:'flex',gap:6,alignItems:'center'}}>
                <button className="btn-ol btn-sm" onClick={()=>onVer(l)}>Ver</button>
                {s2&&<button className="btn btn-sm" onClick={()=>onPagar(s2)}>Pagar</button>}
                <button className="btn-del" onClick={()=>onDelete(l.id)}>×</button>
              </div></td>
            </tr>;
          })}
        </tbody>
      </table></div></div>
    </div>
  );
}

/* ══ CRONOGRAMA IMPRIMIBLE (modal) ══════════════════════════════ */
function CronogramaModal({loan,rows,onClose,isBorrador=false}){
  const modalRef=React.useRef(null);
  const totBase=rows.reduce((a,r)=>a+N(r.cuota_base),0);
  const cuota=rows.length>0?rows[0].cuota_base:0;
  const totCap=rows.reduce((a,r)=>a+N(r.capital_cuota),0);
  const totInt=rows.reduce((a,r)=>a+N(r.interes_cuota),0);
  const totDeg=rows.reduce((a,r)=>a+N(r.desgravamen),0);
  const hasGO=rows.some(r=>N(r.gasto_operativo)>0);
  const hasDeg=rows.some(r=>N(r.desgravamen)>0);
  const D='#1B4F45'; const T='#2d8a7a'; const M='#d4ede5'; const L='#e8f0e8';
  const NF="'DM Sans',sans-serif";

  async function descargarImagen(){
    const el=modalRef.current;
    if(!el||!window.html2canvas){alert('html2canvas no disponible');return;}
    const btn=document.querySelector('.pm-actions');
    if(btn)btn.style.display='none';
    const canvas=await window.html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff'});
    if(btn)btn.style.display='';
    const a=document.createElement('a');
    a.download='cronograma_'+loan.cliente.replace(/\s+/g,'_')+'.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
  }

  async function copiarImagen(){
    const el=modalRef.current;
    if(!el||!window.html2canvas){alert('html2canvas no disponible');return;}
    const btn=document.querySelector('.pm-actions');
    if(btn)btn.style.display='none';
    const canvas=await window.html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff'});
    if(btn)btn.style.display='';
    try{
      canvas.toBlob(async(blob)=>{
        await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
        alert('✓ Imagen copiada al portapapeles');
      },'image/png');
    }catch(ex){
      alert('No se pudo copiar. Usa "Descargar imagen" en su lugar.');
    }
  }

  function imprimir(){
    const el=modalRef.current;
    const w=window.open('','_blank');
    w.document.write('<html><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}body{font-family:"DM Sans",sans-serif;background:#fff}</style></head><body>'+el.innerHTML+'</body></html>');
    w.document.close();
    setTimeout(()=>{w.print();},800);
  }

  const thS={padding:'10px 14px',textAlign:'right',color:'#fff',fontSize:'10px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',background:T,borderBottom:'none'};
  const tdS=(i)=>({padding:'9px 14px',textAlign:'right',borderBottom:'1px solid #edf2ed',color:'#222',background:i%2===0?'#fff':'#f6faf7',fontSize:13});

  return(
    <div className="print-modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div>
        <div className="pm-actions" style={{display:'flex',gap:10,marginBottom:12,justifyContent:'flex-end',flexWrap:'wrap'}}>
          <button style={{background:'rgba(255,255,255,.9)',border:'1.5px solid rgba(255,255,255,.3)',color:'#333',fontSize:12,padding:'8px 18px',borderRadius:6,cursor:'pointer',fontWeight:600}} onClick={onClose}>✕ Cerrar</button>
          <button style={{background:'rgba(255,255,255,.9)',border:'1.5px solid rgba(255,255,255,.3)',color:'#333',fontSize:12,padding:'8px 18px',borderRadius:6,cursor:'pointer',fontWeight:600}} onClick={imprimir}>🖨 Imprimir / PDF</button>
          <button style={{background:'rgba(255,255,255,.9)',border:'1.5px solid rgba(255,255,255,.3)',color:'#333',fontSize:12,padding:'8px 18px',borderRadius:6,cursor:'pointer',fontWeight:600}} onClick={copiarImagen}>📋 Copiar imagen</button>
          <button style={{background:D,border:'none',color:'#fff',fontSize:12,padding:'8px 18px',borderRadius:6,cursor:'pointer',fontWeight:600}} onClick={descargarImagen}>⬇ Descargar</button>
        </div>

        <div className="print-modal" ref={modalRef} style={{fontFamily:NF,color:'#111',borderRadius:0}}>

          {/* HEADER centrado con fondo teal */}
          <div style={{background:T,padding:'18px 32px',textAlign:'center'}}>
            <div style={{fontSize:11,color:'rgba(255,255,255,.6)',letterSpacing:'.22em',textTransform:'uppercase',marginBottom:6}}>Crédito San Juan</div>
            <div style={{fontFamily:NF,fontSize:22,fontWeight:700,color:'#fff',letterSpacing:'.1em',textTransform:'uppercase'}}>CRONOGRAMA DE PAGOS</div>
            {isBorrador&&<div style={{marginTop:8,display:'inline-block',background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',borderRadius:4,padding:'3px 12px',fontSize:11,letterSpacing:'.12em',textTransform:'uppercase',color:'rgba(255,255,255,.8)',fontWeight:700}}>Vista previa — no guardado</div>}
          </div>

          {/* INFO GRID — 2 columnas, sin "titular" en header */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',borderBottom:'2px solid '+L,background:'#fff'}}>
            <div style={{padding:'14px 22px',borderRight:'1px solid '+L}}>
              {[['Cliente',loan.cliente],['Monto',fmt(loan.monto)],['Tipo',loan.tipo],['N° Cuotas',loan.cuotas+' cuotas']].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #f0f5f0',fontSize:12.5}}>
                  <span style={{color:'#666',fontWeight:600}}>{k}:</span>
                  <span style={{fontWeight:k==='Cliente'?700:500,color:'#111'}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{padding:'14px 22px'}}>
              {[['Garante',loan.garante||'—'],['Tasa',(N(loan.tasa)*100).toFixed(1)+'%'],['Desgravamen',fmt(loan.desgravamen||0)],['Fecha del préstamo',fmtD(loan.fecha_prestamo)]].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #f0f5f0',fontSize:12.5}}>
                  <span style={{color:'#666',fontWeight:600}}>{k}:</span>
                  <span style={{fontWeight:500,color:'#111'}}>{v}</span>
                </div>
              ))}
            </div>
          </div>

          {/* CUOTA + TOTAL — dark green, números en DM Sans bold condensed */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',background:D}}>
            <div style={{padding:'16px 24px',textAlign:'center',borderRight:'1px solid rgba(255,255,255,.12)'}}>
              <div style={{fontSize:9,color:'rgba(255,255,255,.5)',textTransform:'uppercase',letterSpacing:'.2em',marginBottom:7,fontWeight:600}}>CUOTA</div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:28,fontWeight:700,color:'#fff',letterSpacing:'-.03em',lineHeight:1}}>{fmt(cuota)}</div>
            </div>
            <div style={{padding:'16px 24px',textAlign:'center'}}>
              <div style={{fontSize:9,color:'rgba(255,255,255,.5)',textTransform:'uppercase',letterSpacing:'.2em',marginBottom:7,fontWeight:600}}>MONTO TOTAL</div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:28,fontWeight:700,color:'#fff',letterSpacing:'-.03em',lineHeight:1}}>{fmt(totBase)}</div>
            </div>
          </div>

          {/* TABLE */}
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
            <thead>
              <tr>
                <th style={{...thS,textAlign:'center',width:42}}>N° Cuota</th>
                <th style={{...thS,textAlign:'left'}}>Fecha Pago</th>
                <th style={thS}>Capital</th>
                <th style={thS}>Interés</th>
                {hasDeg&&<th style={thS}>Desgrav.</th>}
                {hasGO&&<th style={thS}>G. Oper.</th>}
                <th style={{...thS,background:D}}>Cuota Base</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r,i)=>(
                <tr key={r.id}>
                  <td style={{...tdS(i),textAlign:'center',fontWeight:700,color:D,background:i%2===0?L:M}}>{r.n_cuota}</td>
                  <td style={{...tdS(i),textAlign:'left'}}>{fmtD(r.fecha_vence)}</td>
                  <td style={tdS(i)}>{fmt(r.capital_cuota)}</td>

                  {hasDeg&&<td style={tdS(i)}>{fmt(r.desgravamen)}</td>}
                  {hasGO&&<td style={tdS(i)}>{fmt(r.gasto_operativo||0)}</td>}
                  <td style={{...tdS(i),fontWeight:700,color:D,background:i%2===0?'#dff5eb':'#cbeedf'}}>{fmt(r.cuota_base)}</td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr style={{background:L}}>
                <td style={{padding:'9px 14px',textAlign:'center',fontWeight:700,color:D,borderTop:'2px solid '+T,fontSize:12}}></td>
                <td style={{padding:'9px 14px',textAlign:'left',fontWeight:700,color:'#555',borderTop:'2px solid '+T,fontSize:11,textTransform:'uppercase',letterSpacing:'.07em'}}>Totales</td>
                <td style={{padding:'9px 14px',textAlign:'right',fontWeight:700,color:D,borderTop:'2px solid '+T}}>{fmt(totCap)}</td>
                <td style={{padding:'9px 14px',textAlign:'right',fontWeight:700,color:D,borderTop:'2px solid '+T}}>{fmt(totInt)}</td>
                {hasDeg&&<td style={{padding:'9px 14px',textAlign:'right',fontWeight:700,color:D,borderTop:'2px solid '+T}}>{fmt(totDeg)}</td>}
                {hasGO&&<td style={{padding:'9px 14px',textAlign:'right',fontWeight:700,color:D,borderTop:'2px solid '+T}}>{fmt(rows.reduce((a,r)=>a+N(r.gasto_operativo||0),0))}</td>}
                <td style={{padding:'9px 14px',textAlign:'right',fontWeight:700,color:D,borderTop:'2px solid '+T,fontSize:14}}>{fmt(totBase)}</td>
              </tr>
            </tfoot>
          </table>

        </div>
      </div>
    </div>
  );
}

/* ══ CRONOGRAMA ═════════════════════════════════════════════════ */
function Cronograma({loans,sched,viewLoan,onPagar}){
  const[selId,setSelId]=useState(viewLoan?.id??'');
  const[search,setSearch]=useState(viewLoan?String(viewLoan.id):'');
  const[showModal,setShowModal]=useState(false);
  const loan=loans.find(l=>l.id===Number(selId)||l.id===selId);
  const rows=loan?sched.filter(r=>r.prestamo_id===loan.id).sort((a,b)=>a.n_cuota-b.n_cuota):[];
  const totBase=rows.reduce((a,r)=>a+N(r.cuota_base),0);
  const totPag=rows.filter(r=>r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
  const totSaldo=rows.reduce((a,r)=>a+getSaldo(r),0);
  const cuota=rows.length>0?rows[0].cuota_base:0;

  const filtered=React.useMemo(()=>{
    const q=search.trim().toLowerCase();
    if(!q)return loans.slice(0,8);
    return loans.filter(l=>String(l.id)===q||l.cliente.toLowerCase().includes(q)).slice(0,10);
  },[loans,search]);

  function selectLoan(l){setSelId(String(l.id));setSearch(l.cliente+' (ID:'+l.id+')');}

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      {showModal&&loan&&rows.length>0&&<CronogramaModal loan={loan} rows={rows} onClose={()=>setShowModal(false)}/>}

          <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:10,flexWrap:'wrap'}}>

              <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--grey)',pointerEvents:'none'}}>
                <svg viewBox="0 0 24 24" style={{width:14,height:14,stroke:'currentColor',fill:'none',strokeWidth:2,strokeLinecap:'round'}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </span>
              <input className="inp" placeholder="ID o nombre del cliente..." value={search}
                onChange={e=>{setSearch(e.target.value);setSelId('');}} style={{paddingLeft:34}}/>
            </div>
            {loan&&rows.length>0&&<button className="btn" style={{whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6}} onClick={()=>setShowModal(true)}>
              <svg viewBox="0 0 24 24" style={{width:13,height:13,stroke:'currentColor',fill:'none',strokeWidth:2,strokeLinecap:'round'}}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>

          </div>
          {search.trim()&&!selId&&(
            <div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',maxWidth:480}}>
              {filtered.length===0&&<div style={{padding:'10px 14px',color:'var(--grey)',fontSize:13}}>Sin resultados</div>}
              {filtered.map(l=>{
                const est=getEstPrestamo(sched.filter(r=>r.prestamo_id===l.id));
                return<div key={l.id} onClick={()=>selectLoan(l)}
                  style={{padding:'9px 14px',cursor:'pointer',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--white)'}}

      </div>
      {loan&&rows.length===0&&(
        <div className="card" style={{padding:22,background:'#fde8e8',border:'1px solid #f5a5a5'}}>
          <div style={{fontWeight:700,color:'var(--red)',marginBottom:4}}>Sin cuotas en base de datos</div>
          <div style={{color:'var(--red)',fontSize:13}}>Elimínalo desde "Préstamos" y vuelve a registrarlo.</div>
        </div>

      {loan&&rows.length>0&&(
        <div className="card">
          <div className="c-header"><div className="c-header-title">CRONOGRAMA DE PAGOS</div><div className="c-header-sub">Crédito San Juan · {new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'})}</div></div>

            </div>
