<script type="text/babel">
const SURL='https://wimkawjgvzcspcxyyibc.supabase.co';

const db=window.supabase.createClient(SURL,SKEY);
window.XLSX=window.XLSX||null;
const {useState,useEffect,useRef}=React;

// ── Utilidades ────────────────────────────────────────────────────
const N=v=>Number(v)||0;
const fmt=n=>`S/ ${N(n).toFixed(2)}`;
// Formatea fecha "2026-03-01" → "01/03/2026"
const fmtD=d=>{
  if(!d)return'—';
  const s=typeof d==='string'?d.substring(0,10):new Date(d).toISOString().substring(0,10);
  const[y,m,dd]=s.split('-');
  return`${dd}/${m}/${y}`;
};
// Fecha hoy como "2026-03-06"
const todayStr=()=>new Date().toISOString().split('T')[0];
// Parsear "dd/mm/yyyy" o "yyyy-mm-dd" a objeto Date seguro
const parseDate=s=>{
  if(!s)return null;
  if(s.includes('/'))return new Date(`${s.split('/')[2]}-${s.split('/')[1]}-${s.split('/')[0]}T12:00:00`);
  return new Date(s+'T12:00:00');
};
// Retorna "yyyy-mm-dd" desde partes
const buildDate=(d,m,y)=>`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

function sumarMeses(fechaISO,m){
  const b=new Date(fechaISO+'T12:00:00');
  let y=b.getFullYear(),mo=b.getMonth()+1,d=b.getDate();
  mo+=m;while(mo>12){mo-=12;y++;}
  const dm=new Date(y,mo,0).getDate();
  return`${y}-${String(mo).padStart(2,'0')}-${String(Math.min(d,dm)).padStart(2,'0')}`;
}
function getFV(base,n,tipo){
  if(tipo==='MENSUAL')return sumarMeses(base,n);
  const d=new Date(base+'T12:00:00');
  tipo==='SEMANAL'?d.setDate(d.getDate()+n*7+1):d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0];
}
// tasa aquí ya viene como decimal (0.06)
function calcInt(monto,tasa,tipo,cuotas){
  const m=N(monto),t=N(tasa),c=N(cuotas)||1;
  if(tipo==='MENSUAL')return m*t;
  if(tipo==='SEMANAL')return(m/c)*t;
  return(m*t)/30;
}

// ── Estado de cuota ───────────────────────────────────────────────
function getEst(r){
  const tp=(r.tipo_pago||'').toUpperCase().trim();
  if(tp==='SOLO INTERES')return'Solo int.';
  if(tp==='PAGO ADELANTADO')return'Adelantado';
  const pagado=N(r.monto_pagado);
  if(!pagado){
    const fv=new Date(r.fecha_vence+'T12:00:00'),hoy=new Date();
    hoy.setHours(0,0,0,0);
    return fv<hoy?'Vencido':'Pendiente';
  }
  return pagado>=N(r.cuota_base)?'Pagado':'Parcial';
}
function getSaldo(r){
  const tp=(r.tipo_pago||'').toUpperCase().trim();
  if(tp==='SOLO INTERES')return N(r.capital_cuota);
  const pagado=N(r.monto_pagado);
  if(!pagado)return N(r.cuota_base);
  return Math.max(0,N(r.cuota_base)-pagado);
}
function getEstPrestamo(cuotas){
  if(!cuotas.length)return'ACTIVO';
  const ests=cuotas.map(getEst);
  const pagadas=ests.filter(e=>e==='Pagado'||e==='Adelantado').length;
  if(pagadas>=cuotas.length)return'CANCELADO';
  if(ests.some(e=>e==='Vencido'))return'VENCIDO';
  if(pagadas>0)return'EN CURSO';
  return'ACTIVO';
}
function genCrono(loan,pid){
  const m=N(loan.monto),t=N(loan.tasa),c=N(loan.cuotas);
  const d=N(loan.desgravamen||0),go=N(loan.gasto_operativo||0);
  const cap=parseFloat((m/c).toFixed(2));
  const int=parseFloat(calcInt(m,t,loan.tipo,c).toFixed(2));
  const base=parseFloat((cap+int+d+go).toFixed(2));
  return Array.from({length:c},(_,i)=>({
    prestamo_id:pid,cliente:loan.cliente,n_cuota:i+1,
    fecha_vence:getFV(loan.fecha_prestamo,i+1,loan.tipo),
    capital_cuota:cap,interes_cuota:int,desgravamen:d,
    cuota_base:base,
    tipo_pago:'NORMAL',monto_pagado:null,mora:null,fecha_pago:null,
  }));
}

// ── Selector de fecha dd/mm/yyyy ───────────────────────────────────
function DatePicker({value,onChange,label}){
  // value es "yyyy-mm-dd"
  const[dd,mm,yy]=value?value.split('-').reverse():[String(new Date().getDate()).padStart(2,'0'),String(new Date().getMonth()+1).padStart(2,'0'),String(new Date().getFullYear())];
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const years=Array.from({length:10},(_,i)=>new Date().getFullYear()-2+i);
  const dias=Array.from({length:31},(_,i)=>String(i+1).padStart(2,'0'));
  function update(field,val){
    const cur=value||todayStr();
    const[cy,cm,cd]=cur.split('-');
    const nd=field==='d'?val:cd,nm=field==='m'?val:cm,ny=field==='y'?val:cy;
    onChange(buildDate(parseInt(nd),parseInt(nm),ny));
  }
  return(
    <div>
      {label&&<span className="lbl">{label}</span>}
      <div className="date-inp">
        <select value={dd} onChange={e=>update('d',e.target.value)}>
          {dias.map(d=><option key={d} value={d}>{d}</option>)}
        </select>
        <select value={mm} onChange={e=>update('m',e.target.value)}>
          {meses.map((m,i)=><option key={i} value={String(i+1).padStart(2,'0')}>{m}</option>)}
        </select>
        <select value={yy} onChange={e=>update('y',e.target.value)}>
          {years.map(y=><option key={y} value={y}>{y}</option>)}
        </select>
      </div>
    </div>
  );
}

// ── Donut Chart ────────────────────────────────────────────────────
function Donut({segs,total,cv,cl}){
  const r=42,cx=55,cy=55,circ=2*Math.PI*r;
  let off=0;
  return(
    <div className="donut-wrap">
      <svg viewBox="0 0 110 110" width="110" height="110" style={{transform:'rotate(-90deg)'}}>
        {segs.map((s,i)=>{
          const pct=total>0?s.v/total:0;
          const p=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.c} strokeWidth="11" strokeDasharray={`${circ*pct} ${circ*(1-pct)}`} strokeDashoffset={-off*circ}/>;
          off+=pct;return p;
        })}
      </svg>
      <div className="donut-center"><div className="donut-cv">{cv}</div><div className="donut-cl">{cl}</div></div>
    </div>
  );
}

/* ══ LOGIN ══════════════════════════════════════════════════════ */
function Login({onLogin}){
  const[mode,setMode]=useState('login');
  const[email,setEmail]=useState('');
  const[pass,setPass]=useState('');
  const[loading,setLoading]=useState(false);
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState('');
  async function submit(){
    setMsg('');setLoading(true);
    const res=await(mode==='login'?db.auth.signInWithPassword({email,password:pass}):db.auth.signUp({email,password:pass}));
    if(res.error)setMsg(res.error.message);
    else if(mode==='register')setMsg('✓ Cuenta creada. Inicia sesión.');
    else onLogin(res.data.user);
    setLoading(false);
  }
  return(
    <div className="login-bg">
      <div className="login-card">
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:46,height:46,border:'1.5px solid var(--teal)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',background:'linear-gradient(135deg,#f9f3e6,#fff)'}}>
            <svg viewBox="0 0 24 24" style={{width:20,height:20,stroke:'var(--teal2)',fill:'none',strokeWidth:1.7,strokeLinecap:'round'}}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </div>
          <div style={{fontFamily:"'Fraunces',serif",fontSize:24,fontWeight:700,color:'var(--ink)'}}>Crédito <em style={{color:'var(--teal)',fontStyle:'italic'}}>San Juan</em></div>
          <div style={{fontSize:11.5,color:'var(--grey)',marginTop:4}}>Plataforma de gestión financiera</div>
        </div>
        <div style={{display:'grid',gap:12,marginBottom:14}}>
          <div><span className="lbl">Correo electrónico</span><input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="usuario@correo.com" onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
          <div><span className="lbl">Contraseña</span><input className="inp" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
        </div>
        {msg&&<div style={{fontSize:12.5,padding:'9px 12px',borderRadius:7,marginBottom:12,background:msg.startsWith('✓')?'#dff2e8':'#fde8e8',color:msg.startsWith('✓')?'#1e6e3a':'#b52a2a'}}>{msg}</div>}
        <button className="btn" style={{width:'100%',marginBottom:12,padding:'12px'}} onClick={submit} disabled={loading||!email||!pass}>{loading?'Verificando...':mode==='login'?'Iniciar sesión':'Crear cuenta'}</button>
        <p style={{fontSize:12.5,color:'var(--grey)',textAlign:'center'}}>{mode==='login'?'¿Primera vez? ':'¿Ya tienes cuenta? '}<span style={{color:'var(--teal)',cursor:'pointer',fontWeight:600}} onClick={()=>{setMode(m=>m==='login'?'register':'login');setMsg('');}}>{mode==='login'?'Crear cuenta':'Iniciar sesión'}</span></p>
      </div>
    </div>
  );
}

/* ══ APP ════════════════════════════════════════════════════════ */
function App(){
  const[user,setUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);
  const[view,setView]=useState('dashboard');
  const[loans,setLoans]=useState([]);
  const[sched,setSched]=useState([]);
  const[loading,setLoading]=useState(false);
  const[saving,setSaving]=useState(false);
  const[payingRow,setPayingRow]=useState(null);
  const[viewLoan,setViewLoan]=useState(null);
  const[toast,setToast]=useState(null);
  const[mob,setMob]=useState(false);
  const[dbError,setDbError]=useState(null);// Error visible para debug

  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{setUser(session?.user??null);setAuthLoading(false);});
    const{data:{subscription}}=db.auth.onAuthStateChange((_,s)=>{setUser(s?.user??null);setAuthLoading(false);});
    return()=>subscription.unsubscribe();
  },[]);
  useEffect(()=>{if(user)loadAll();},[user]);

  async function loadAll(){
    setLoading(true);setDbError(null);
    const[lr,sr]=await Promise.all([
      db.from('prestamos').select('*').order('created_at',{ascending:false}),
      db.from('cronograma').select('*').order('n_cuota',{ascending:true}),
    ]);
    if(lr.error){setDbError('Error cargando préstamos: '+lr.error.message);setLoading(false);return;}
    if(sr.error){setDbError('Error cargando cronograma: '+sr.error.message);setLoading(false);return;}
    setLoans(lr.data||[]);
    setSched(sr.data||[]);
    setLoading(false);
  }

  // Despierta Supabase antes de operaciones importantes
  async function pingDB(){
    await db.from('prestamos').select('id').limit(1);
  }

  const showToast=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),4500);};

  // Fetch con timeout configurable
  async function apiFetch(url,opts,timeoutMs=30000){
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),timeoutMs);
    try{
      const r=await fetch(url,{...opts,signal:ctrl.signal});
      clearTimeout(tid);
      return r;
    }catch(ex){
      clearTimeout(tid);
      if(ex.name==='AbortError')throw new Error('TIMEOUT: el servidor no respondió en '+Math.round(timeoutMs/1000)+'s');
      throw ex;
    }
  }

  async function crearPrestamo(data){
    setDbError(null);
    setSaving(true);

    const{data:{session}}=await db.auth.getSession();
    const token=session?.access_token||SKEY;
    const H={
      'Content-Type':'application/json',
      'apikey':SKEY,
      'Authorization':'Bearer '+token,
      'Prefer':'return=representation',
    };

    // 1. INSERT préstamo (timeout 30s)
    let loan=null;
    try{
      const r=await apiFetch(SURL+'/rest/v1/prestamos',{method:'POST',headers:H,
        body:JSON.stringify({
          cliente:data.cliente,garante:data.garante||'',
          referencia:data.referencia||'',cliente_externo:data.clienteExterno,
          monto:N(data.monto),tasa:N(data.tasa),tipo:data.tipo,
          cuotas:N(data.cuotas),desgravamen:N(data.desgravamen||0),
          gasto_operativo:N(data.gastoOperativo||0),
          fecha_prestamo:data.fechaPrestamo,creado_por_email:user.email,
        }),
      });
      const txt=await r.text();
      let json;try{json=JSON.parse(txt);}catch(e){json=null;}
      if(!r.ok){
        const msg='HTTP '+r.status+': '+(json?.message||json?.error||txt);
        setSaving(false);setDbError(msg);showToast(msg,'err');
        alert('❌ ERROR PRÉSTAMO:\n'+msg);return false;
      }
      loan=Array.isArray(json)?json[0]:json;
      if(!loan?.id){
        const msg='Sin ID en respuesta: '+JSON.stringify(json).substring(0,200);
        setSaving(false);setDbError(msg);alert('❌ ERROR: '+msg);return false;
      }
    }catch(ex){
      const msg=ex.message;
      setSaving(false);setDbError(msg);alert('❌ ERROR PRÉSTAMO:\n'+msg);return false;
    }

    // 2. INSERT cronograma (timeout 30s)
    // Normalizar: genCrono espera fecha_prestamo (snake) pero el form envía fechaPrestamo (camel)
    const dataParaCrono={...data, fecha_prestamo: data.fechaPrestamo||data.fecha_prestamo};
    const rows=genCrono(dataParaCrono,loan.id).map(r=>({
      prestamo_id:Number(loan.id),cliente:String(data.cliente),
      n_cuota:Number(r.n_cuota),fecha_vence:String(r.fecha_vence),
      capital_cuota:Number(r.capital_cuota),interes_cuota:Number(r.interes_cuota),
      desgravamen:Number(r.desgravamen),cuota_base:Number(r.cuota_base),
      tipo_pago:'NORMAL',monto_pagado:null,mora:null,fecha_pago:null,
    }));
    try{
      const r=await apiFetch(SURL+'/rest/v1/cronograma',{method:'POST',headers:H,body:JSON.stringify(rows)});
      const txt=await r.text();
      let json;try{json=JSON.parse(txt);}catch(e){json=null;}
      if(!r.ok){
        const msg='HTTP '+r.status+': '+(json?.message||json?.error||txt);
        setDbError(msg);
        alert('⚠ CRONOGRAMA: '+msg+' — Préstamo guardado ID:'+loan.id);
      }
    }catch(ex){
      setDbError(ex.message);
      alert('⚠ CRONOGRAMA: '+ex.message+' — Préstamo guardado ID:'+loan.id);
    }

    await loadAll();
    setSaving(false);
    showToast('✓ Préstamo guardado');
    return true;
  }

  async function registrarPago(rowId,pago){
    const{error}=await db.from('cronograma').update({
      tipo_pago:pago.tipoPago,
      monto_pagado:N(pago.montoPagado),
      mora:pago.mora?N(pago.mora):null,
      fecha_pago:pago.fechaPago,
    }).eq('id',rowId);
    if(error){showToast('Error: '+error.message,'err');return;}
    setSched(p=>p.map(r=>r.id===rowId?{...r,tipo_pago:pago.tipoPago,monto_pagado:N(pago.montoPagado),mora:pago.mora?N(pago.mora):null,fecha_pago:pago.fechaPago}:r));
    showToast('✓ Pago registrado');
    setPayingRow(null);
  }

  async function pagarTodo(loanId,fechaPago){
    const pendientes=sched.filter(r=>r.prestamo_id===loanId&&getEst(r)!=='Pagado'&&getEst(r)!=='Adelantado');
    for(const r of pendientes){
      await db.from('cronograma').update({tipo_pago:'PAGO ADELANTADO',monto_pagado:N(r.cuota_base),mora:null,fecha_pago:fechaPago}).eq('id',r.id);
    }
    setSched(p=>p.map(r=>pendientes.find(x=>x.id===r.id)?{...r,tipo_pago:'PAGO ADELANTADO',monto_pagado:N(r.cuota_base),mora:null,fecha_pago:fechaPago}:r));
    showToast('✓ Préstamo cancelado — '+pendientes.length+' cuotas marcadas como pagadas');
  }

  async function eliminarPrestamo(id){
    if(!confirm('¿Eliminar este préstamo y su cronograma? No se puede deshacer.'))return;
    await db.from('prestamos').delete().eq('id',id);
    setLoans(p=>p.filter(l=>l.id!==id));
    setSched(p=>p.filter(r=>r.prestamo_id!==id));
    showToast('Préstamo eliminado');
  }

  function goTo(v){setView(v);setMob(false);if(v!=='schedule')setViewLoan(null);if(v!=='payments')setPayingRow(null);}

  if(authLoading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh'}}><Spin/></div>;
  if(!user)return<Login onLogin={setUser}/>;

  const nav=[{id:'dashboard',ic:'dash',lbl:'Dashboard'},{id:'newLoan',ic:'plus',lbl:'Nuevo préstamo'},{id:'loans',ic:'list',lbl:'Préstamos'},{id:'schedule',ic:'cal',lbl:'Cronograma'},{id:'payments',ic:'pay',lbl:'Registrar pago'},{id:'export',ic:'trend',lbl:'Exportar Excel'}];

  const SBC=()=>(
    <>
      <div className="sb-hd">
        <div className="sb-em"><svg viewBox="0 0 24 24" style={{width:16,height:16}}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="var(--gold)" stroke="none"/><polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="rgba(0,0,0,.4)" strokeWidth="1.5"/></svg></div>
        <div className="sb-brand">Crédito <em>San Juan</em></div>
        <div className="sb-tag">Gestión financiera</div>
      </div>
      <div className="sb-div"/>
      <div className="sb-nav">
        <div className="sb-sec">Menú</div>
        {nav.map(n=><div key={n.id} className={`nl${view===n.id?' on':''}`} onClick={()=>goTo(n.id)}><div className="nl-ic">{IC[n.ic]}</div>{n.lbl}</div>)}
      </div>
      <div className="sb-ft">
        <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:9}}>
          <div className="sb-av">{user.email[0].toUpperCase()}</div>
          <div className="sb-email">{user.email}</div>
        </div>
        <button className="btn-lo" onClick={()=>db.auth.signOut()}>Cerrar sesión</button>
      </div>
    </>
  );

  return(
    <div className="shell">
      <div className="sb"><SBC/></div>
      {mob&&<><div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.42)',zIndex:199}} onClick={()=>setMob(false)}/><div className="sb open"><SBC/></div></>}
      <div className="main">
        <div className="mob-bar">
          <button onClick={()=>setMob(true)} style={{background:'rgba(255,255,255,.12)',border:'none',color:'#fff',borderRadius:6,padding:'6px 12px',fontSize:13,cursor:'pointer'}}>☰</button>
          <span style={{fontFamily:"'Fraunces',serif",color:'#fff',fontSize:15,fontWeight:700}}>Crédito San Juan</span>
          <div style={{width:40}}/>
        </div>
        {(loading||saving)&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:998,background:'rgba(13,31,13,.55)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{background:'#fff',borderRadius:14,padding:'32px 40px',textAlign:'center',boxShadow:'0 12px 40px rgba(0,0,0,.25)',maxWidth:360}}>
            <div style={{width:40,height:40,border:'3px solid #d4ede5',borderTop:'3px solid var(--teal2)',borderRadius:'50%',animation:'spin .9s linear infinite',margin:'0 auto 16px'}}/>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:17,fontWeight:700,color:'var(--ink)',marginBottom:8}}>{saving?'Guardando préstamo...':'Cargando datos...'}</div>
            <div style={{fontSize:12.5,color:'var(--grey)',lineHeight:1.6}}>{saving?'Esto puede tomar hasta 2 minutos. No cierres la página.':'Conectando con Supabase...'}</div>
            {saving&&<div style={{marginTop:16,fontSize:11,color:'#aaa'}}>Supabase Free inicia en frío — normal en primera operación del día</div>}
          </div>
        </div>}
        <div className="page">
          {dbError&&(
            <div className="err-box">
              <strong>⚠ Error de base de datos — ejecuta el SQL de permisos en Supabase</strong>
              {dbError}
            </div>
          )}
          {view==='dashboard'&&<Dashboard loans={loans} sched={sched} goTo={goTo} setPayingRow={setPayingRow}/>}
          {view==='newLoan'  &&<NuevoPrestamo onCreate={crearPrestamo}/>}
          {view==='loans'   &&<Prestamos loans={loans} sched={sched} onDelete={eliminarPrestamo} onVer={l=>{setViewLoan(l);goTo('schedule');}} onPagar={r=>{setPayingRow(r);goTo('payments');}}/>}
          {view==='schedule'&&<Cronograma loans={loans} sched={sched} viewLoan={viewLoan} onPagar={r=>{setPayingRow(r);goTo('payments');}}/>}
          {view==='payments'&&<RegistrarPago loans={loans} sched={sched} payingRow={payingRow} onPay={registrarPago} onPagarTodo={pagarTodo}/>}
          {view==='export'   &&<ExportarExcel loans={loans} sched={sched}/>}
        </div>
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

/* ══ DASHBOARD ══════════════════════════════════════════════════ */
function Dashboard({loans,sched,goTo,setPayingRow}){
  const venc=sched.filter(r=>getEst(r)==='Vencido');
  const totPres=loans.reduce((a,l)=>a+N(l.monto),0);
  const totCob=sched.filter(r=>r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
  const montoVenc=venc.reduce((a,r)=>a+getSaldo(r),0);
  const porCobrar=sched.filter(r=>!['Pagado','Adelantado'].includes(getEst(r))).reduce((a,r)=>a+getSaldo(r),0);
  const nPag=sched.filter(r=>['Pagado','Adelantado'].includes(getEst(r))).length;
  const nPend=sched.filter(r=>getEst(r)==='Pendiente').length;
  const nVenc=venc.length;
  const totInt=sched.reduce((a,r)=>a+N(r.interes_cuota),0);
  const totMora=sched.reduce((a,r)=>a+N(r.mora||0),0);
  const total=sched.length||1;
  const meses=Array.from({length:6},(_,i)=>{
    const d=new Date();d.setMonth(d.getMonth()-(5-i));
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const lbl=['En','Fe','Ma','Ab','My','Jn','Jl','Ag','Se','Oc','No','Di'][d.getMonth()];
    return{lbl,cob:sched.filter(r=>r.fecha_pago?.substring(0,7)===key).reduce((a,r)=>a+N(r.monto_pagado),0),pre:loans.filter(l=>l.fecha_prestamo?.substring(0,7)===key).reduce((a,l)=>a+N(l.monto),0)};
  });
  const maxM=Math.max(...meses.map(m=>Math.max(m.cob,m.pre)),1);

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div><div className="pg-ey">Panel de control</div><div className="pg-ti">Dashboard Financiero</div><div className="pg-su">{new Date().toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div>
      <div className="kpi-grid">
        {[
          {l:'Capital prestado',v:fmt(totPres),   c:'var(--dark)', bg:'var(--light)', ic:'trend',bar:'var(--dark)'},
          {l:'Total cobrado',   v:fmt(totCob),    c:'var(--green)',bg:'#dff2e8',      ic:'check',bar:'var(--green)'},
          {l:'Por cobrar',      v:fmt(porCobrar), c:'#a0620a',     bg:'#fef3e2',      ic:'coin', bar:'#d97706'},
          {l:'Monto vencido',   v:fmt(montoVenc), c:'var(--red)',  bg:'#fde8e8',      ic:'warn', bar:'var(--red2)'},
          {l:'Mora acumulada',  v:fmt(totMora),   c:'var(--red)',  bg:'#fde8e8',      ic:'warn', bar:'var(--red)'},
          {l:'Interés generado',v:fmt(totInt),    c:'var(--teal)', bg:'#e4f4f0',      ic:'trend',bar:'var(--teal2)'},
        ].map((k,i)=>(
          <div key={i} className="kpi">
            <div className="kpi-bar" style={{background:k.bar}}/>
            <div className="kpi-lbl" style={{color:'var(--grey)',marginBottom:6}}>{k.l}</div>
            <div className="kpi-val" style={{color:k.c}}>{k.v}</div>
          </div>
        ))}
      </div>
      <div className="dash-panels" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:15}}>
        <div className="card">
          <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Estado de cuotas</div></div>
          <div className="c-bd">
            <div style={{display:'flex',gap:16,alignItems:'center'}}>
              <Donut segs={[{v:nPag,c:'#1e6e3a'},{v:nPend,c:'#2356a0'},{v:nVenc,c:'#b52a2a'}]} total={total} cv={sched.length} cl="cuotas"/>
              <div style={{flex:1,display:'grid',gap:9}}>
                {[{l:'Pagadas',n:nPag,c:'#1e6e3a'},{l:'Pendientes',n:nPend,c:'#2356a0'},{l:'Vencidas',n:nVenc,c:'#b52a2a'}].map(i=>(
                  <div key={i.l}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3,fontSize:12.5}}>
                      <span style={{color:i.c,fontWeight:600,display:'flex',alignItems:'center',gap:5}}><span style={{width:7,height:7,borderRadius:'50%',background:i.c,display:'inline-block'}}/>{i.l}</span>
                      <span style={{fontWeight:700}}>{i.n}</span>
                    </div>
                    <div style={{background:'#eef3ee',borderRadius:3,height:5}}><div style={{background:i.c,borderRadius:3,height:5,width:`${total>0?Math.round(i.n/total*100):0}%`}}/></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
        <div className="card">
          <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Balance del negocio</div></div>
          <div className="c-bd" style={{padding:'12px 18px'}}>
            {[{l:'Capital prestado',c:'var(--dark)',v:totPres},{l:'Capital cobrado',c:'var(--green)',v:totCob},{l:'En calle',c:'#a0620a',v:Math.max(0,totPres-totCob)},{l:'Interés generado',c:'var(--teal)',v:totInt},{l:'Mora acumulada',c:'var(--red)',v:totMora}].map(i=>(
              <div key={i.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #f0f5f0',fontSize:13}}>
                <span style={{color:'#555',display:'flex',alignItems:'center',gap:7}}><span style={{width:7,height:7,borderRadius:'50%',background:i.c,display:'inline-block'}}/>{i.l}</span>
                <span style={{fontWeight:700,color:i.c}}>{fmt(i.v)}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Actividad mensual</div></div>
          <div className="c-bd">
            <div style={{display:'flex',gap:12,marginBottom:10,fontSize:11.5}}>
              <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:9,height:9,borderRadius:2,background:'var(--teal2)',display:'inline-block'}}/> Cobrado</span>
              <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:9,height:9,borderRadius:2,background:'var(--dark)',display:'inline-block',opacity:.4}}/> Prestado</span>
            </div>
            <svg viewBox="0 0 300 100" style={{width:'100%',height:100}}>
              {meses.map((m,i)=>{
                const bw=38,gap=12,x=i*(bw+gap);
                const hC=maxM>0?Math.max((m.cob/maxM)*78,m.cob>0?4:0):0;
                const hP=maxM>0?Math.max((m.pre/maxM)*78,m.pre>0?4:0):0;
                return<g key={i} transform={`translate(${x},0)`}>
                  <rect x={0} y={82-hP} width={17} height={hP} rx="2.5" fill="var(--dark)" opacity=".35"/>
                  <rect x={21} y={82-hC} width={17} height={hC} rx="2.5" fill="var(--teal2)"/>
                  <text x={19} y={96} textAnchor="middle" fontSize="8" fill="var(--grey)">{m.lbl}</text>
                </g>;
              })}
            </svg>
          </div>
        </div>
      </div>
      {venc.length>0&&(
        <div className="card" style={{marginBottom:13,border:'1px solid #f5a5a5'}}>
          <div className="c-hd" style={{background:'#fde8e8',borderBottom:'1px solid #f5a5a5'}}>
            <div className="c-dot" style={{background:'var(--red)'}}/><div className="c-hd-t" style={{color:'var(--red)'}}>Cuotas vencidas — acción requerida ({venc.length})</div>
          </div>
          <div className="tbl-wrap"><table>
            <thead><tr><th>Cliente</th><th>N° Cuota</th><th>Venció el</th><th>Cuota base</th><th>Saldo</th><th></th></tr></thead>
            <tbody>{venc.slice(0,8).map((r,i)=>(
              <tr key={i}>
                <td style={{fontWeight:600}}>{r.cliente}</td>
                <td style={{color:'var(--grey)'}}>{r.n_cuota}</td>
                <td style={{color:'var(--red)',fontWeight:600,fontSize:12}}>{fmtD(r.fecha_vence)}</td>
                <td>{fmt(r.cuota_base)}</td>
                <td style={{fontWeight:700,color:'var(--red)'}}>{fmt(getSaldo(r))}</td>
                <td><button className="btn btn-sm" onClick={()=>{setPayingRow(r);goTo('payments');}}>Cobrar</button></td>
              </tr>
            ))}</tbody>
          </table></div>
        </div>
      )}
      {loans.length>0?(
        <div className="card">
          <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Préstamos recientes</div></div>
          <div className="tbl-wrap"><table>
            <thead><tr><th>Cliente</th><th>Monto</th><th>Tipo</th><th>Cuotas</th><th>Inicio</th><th>Estado</th></tr></thead>
            <tbody>{loans.slice(0,6).map(l=>{
              const est=getEstPrestamo(sched.filter(r=>r.prestamo_id===l.id));
              return<tr key={l.id}>
                <td style={{fontWeight:600}}>{l.cliente}</td>
                <td style={{fontWeight:700,color:'var(--dark)'}}>{fmt(l.monto)}</td>
                <td><span style={{fontSize:10.5,background:'var(--light)',color:'var(--dark)',borderRadius:4,padding:'3px 8px',fontWeight:700}}>{l.tipo}</span></td>
                <td style={{color:'var(--grey)'}}>{l.cuotas}</td>
                <td style={{color:'var(--grey)',fontSize:12}}>{fmtD(l.fecha_prestamo)}</td>
                <td><Badge s={est}/></td>
              </tr>;
            })}</tbody>
          </table></div>
        </div>
      ):(
        <div className="card" style={{textAlign:'center',padding:52}}>
          <div style={{width:48,height:48,borderRadius:13,background:'var(--light)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 13px',color:'var(--teal)'}}><svg viewBox="0 0 24 24" style={{width:24,height:24,stroke:'currentColor',fill:'none',strokeWidth:1.5,strokeLinecap:'round'}}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg></div>
          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:16,color:'var(--ink)',fontWeight:700,marginBottom:7}}>Sin préstamos registrados</div>
          <div style={{color:'var(--grey)',marginBottom:18,fontSize:13}}>Empieza registrando el primer préstamo</div>
          <button className="btn" onClick={()=>goTo('newLoan')}>Nuevo préstamo</button>
        </div>
      )}
    </div>
  );
}

/* ══ NUEVO PRÉSTAMO ═════════════════════════════════════════════ */
function NuevoPrestamo({onCreate}){
  const[f,setF]=useState({
    cliente:'',garante:'',referencia:'',clienteExterno:'NO',
    monto:'',tasaPct:'6',tipo:'MENSUAL',cuotas:'',
    desgravamen:'0',gastoOperativo:'0',
    fechaPrestamo:todayStr(),
  });
  const[prev,setPrev]=useState(false);
  const[saving,setSaving]=useState(false);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));

  const m=N(f.monto),t=N(f.tasaPct)/100,c=N(f.cuotas),d=N(f.desgravamen),go=N(f.gastoOperativo);
  const cap=c>0?parseFloat((m/c).toFixed(2)):0;
  const int=parseFloat(calcInt(m,t,f.tipo,c).toFixed(2));
  const cota=parseFloat((cap+int+d+go).toFixed(2));
  const total=parseFloat((m+int*c+(d+go)*c).toFixed(2));
  const prevRows=c>0?Array.from({length:Math.min(c,60)},(_,i)=>({n:i+1,fecha:getFV(f.fechaPrestamo,i+1,f.tipo)})):[];

  async function submit(){
    if(!f.cliente.trim()||!f.monto||!f.cuotas){alert('Completa: cliente, monto y número de cuotas.');return;}
    setSaving(true);
    const ok=await onCreate({...f,tasa:t});// pasamos tasa como decimal
    setSaving(false);
    if(ok){setF({cliente:'',garante:'',referencia:'',clienteExterno:'NO',monto:'',tasaPct:'6',tipo:'MENSUAL',cuotas:'',desgravamen:'0',gastoOperativo:'0',fechaPrestamo:todayStr()});setPrev(false);}
  }

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div><div className="pg-ey">Operaciones</div><div className="pg-ti">Nuevo Préstamo</div><div className="pg-su">Completa los datos. Usa "Vista previa" para verificar el cronograma antes de guardar.</div></div>
      <div style={{display:'grid',gridTemplateColumns:'minmax(0,470px) 1fr',gap:18,alignItems:'start'}}>
        <div className="card">
          <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Datos del préstamo</div></div>
          <div className="c-bd">
            <div className="sec-tag">Datos del cliente</div>
            <div style={{display:'grid',gap:11,marginBottom:18}}>
              <div><span className="lbl">Nombre del cliente *</span><input className="inp" value={f.cliente} onChange={e=>s('cliente',e.target.value)} placeholder="Nombre completo"/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><span className="lbl">Socio garante</span><input className="inp" value={f.garante} onChange={e=>s('garante',e.target.value)}/></div>
                <div><span className="lbl">Referenciado por</span><input className="inp" value={f.referencia} onChange={e=>s('referencia',e.target.value)}/></div>
              </div>
              <div style={{maxWidth:175}}><span className="lbl">Cliente externo</span>
                <select className="inp" value={f.clienteExterno} onChange={e=>s('clienteExterno',e.target.value)}><option>NO</option><option>SI</option></select>
              </div>
            </div>
            <div className="sec-tag">Parámetros del préstamo</div>
            <div style={{display:'grid',gap:11}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><span className="lbl">Monto (S/.) *</span><input className="inp" type="number" value={f.monto} onChange={e=>s('monto',e.target.value)} placeholder="900"/></div>
                <div>
                  <span className="lbl">Tasa de interés</span>
                  <div className="tasa-wrap">
                    <input className="inp" type="number" step="0.5" value={f.tasaPct} onChange={e=>s('tasaPct',e.target.value)} placeholder="6"/>
                    <span className="tasa-suf">%</span>
                  </div>
                  <span style={{fontSize:11,color:'var(--grey)',marginTop:3,display:'block'}}>Escribe 6 para 6% mensual</span>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><span className="lbl">N° cuotas *</span><input className="inp" type="number" value={f.cuotas} onChange={e=>s('cuotas',e.target.value)}/></div>
                <div><span className="lbl">Tipo de cronograma</span>
                  <select className="inp" value={f.tipo} onChange={e=>s('tipo',e.target.value)}><option>MENSUAL</option><option>SEMANAL</option><option>DIARIO</option></select>
                </div>
              </div>
              <DatePicker label="Fecha del préstamo" value={f.fechaPrestamo} onChange={v=>s('fechaPrestamo',v)}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div>
                  <span className="lbl">Desgravamen / cuota (S/.)</span>
                  <input className="inp" type="number" value={f.desgravamen} onChange={e=>s('desgravamen',e.target.value)}/>
                  <span style={{fontSize:11,color:'var(--grey)',marginTop:3,display:'block'}}>Seguro de vida por cuota</span>
                </div>
                <div>
                  <span className="lbl">Gasto operativo / cuota (S/.)</span>
                  <input className="inp" type="number" value={f.gastoOperativo} onChange={e=>s('gastoOperativo',e.target.value)}/>
                  <span style={{fontSize:11,color:'var(--grey)',marginTop:3,display:'block'}}>Cargo administrativo por cuota</span>
                </div>
              </div>
            </div>
            {m>0&&c>0&&(
              <div style={{marginTop:16,background:'linear-gradient(135deg,var(--light),#f0faf6)',border:'1.5px solid var(--border)',borderRadius:10,padding:'14px 17px'}}>
                <div style={{fontSize:10,fontWeight:700,color:'var(--teal)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:10}}>Resumen calculado</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'7px 18px',fontSize:13,marginBottom:12}}>
                  <div><span style={{color:'var(--grey)',fontSize:11.5}}>Capital / cuota</span><div style={{fontWeight:600}}>{fmt(cap)}</div></div>
                  <div><span style={{color:'var(--grey)',fontSize:11.5}}>Interés / cuota ({f.tasaPct}%)</span><div style={{fontWeight:600}}>{fmt(int)}</div></div>
                  <div><span style={{color:'var(--grey)',fontSize:11.5}}>Desgravamen</span><div style={{fontWeight:600}}>{fmt(d)}</div></div>
                  <div><span style={{color:'var(--grey)',fontSize:11.5}}>Gasto operativo</span><div style={{fontWeight:600}}>{fmt(go)}</div></div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div style={{background:'var(--dark)',borderRadius:8,padding:'10px 14px',textAlign:'center'}}>
                    <div style={{fontSize:9.5,color:'rgba(255,255,255,.55)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:3}}>CUOTA TOTAL</div>
                    <div style={{fontSize:20,fontWeight:700,color:'#fff'}}>{fmt(cota)}</div>
                  </div>
                  <div style={{background:'var(--teal)',borderRadius:8,padding:'10px 14px',textAlign:'center'}}>
                    <div style={{fontSize:9.5,color:'rgba(255,255,255,.55)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:3}}>MONTO FINAL</div>
                    <div style={{fontSize:20,fontWeight:700,color:'#fff'}}>{fmt(total)}</div>
                  </div>
                </div>
              </div>
            )}
            <div style={{display:'flex',gap:10,marginTop:16,flexWrap:'wrap'}} className="btn-row">
              <button className="btn-ol" onClick={()=>setPrev(!prev)}>Vista previa</button>
              <button className="btn" onClick={submit} disabled={saving}>{saving?'Guardando...':'✓ Ejecutar — Guardar'}</button>
              <button className="btn-ol btn-sm" style={{fontSize:11,color:'var(--grey)'}} onClick={async()=>{
                const{data:{session}}=await db.auth.getSession();
                const token=session?.access_token||SKEY;
                const H={'Content-Type':'application/json','apikey':SKEY,'Authorization':'Bearer '+token,'Prefer':'return=representation'};
                let log='=== DIAGNÓSTICO DB ===';
                try{
                  const r=await apiFetch(SURL+'/rest/v1/prestamos?limit=1',{headers:H},8000);
                  log+=' | SELECT:'+r.status;
                }catch(ex){log+=' | SELECT FALLO:'+ex.message;}
                let testId=null;
                try{
                  const r=await apiFetch(SURL+'/rest/v1/prestamos',{method:'POST',headers:H,body:JSON.stringify({cliente:'__TEST__',monto:1,tasa:0.01,tipo:'MENSUAL',cuotas:1,fecha_prestamo:'2026-01-01',creado_por_email:'test@test.com'})},10000);
                  const txt=await r.text();
                  log+=' | INSERT-P:'+r.status;
                  if(r.ok){const j=JSON.parse(txt);testId=(Array.isArray(j)?j[0]:j)?.id;}
                }catch(ex){log+=' | INSERT-P FALLO:'+ex.message;}
                if(testId){
                  try{
                    const r=await apiFetch(SURL+'/rest/v1/cronograma',{method:'POST',headers:H,body:JSON.stringify([{prestamo_id:testId,cliente:'__TEST__',n_cuota:1,fecha_vence:'2026-01-01',capital_cuota:1,interes_cuota:0.01,desgravamen:0,cuota_base:1.01,tipo_pago:'NORMAL'}])},10000);
                    log+=' | INSERT-C:'+r.status;
                    if(!r.ok){const t=await r.text();log+='('+t.substring(0,60)+')';}
                  }catch(ex){log+=' | INSERT-C FALLO:'+ex.message;}
                  await fetch(SURL+'/rest/v1/cronograma?prestamo_id=eq.'+testId,{method:'DELETE',headers:H});
                  await fetch(SURL+'/rest/v1/prestamos?id=eq.'+testId,{method:'DELETE',headers:H});
                }
                alert(log);
              }}>Diag DB</button>
            </div>
          </div>
        </div>

        {prev&&c>0&&(
          <div className="card" style={{maxHeight:600,overflow:'auto',animation:'fadeIn .2s ease'}}>
            <div className="c-header">
              <div className="c-header-title">CRONOGRAMA DE PAGOS</div>
              <div className="c-header-sub">Vista previa — {f.cliente||'Cliente'}</div>
            </div>
            <div className="crono-info">
              <div style={{borderRight:'1px solid var(--border)'}}>
                {[['Cliente',f.cliente||'—'],['Monto',fmt(m)],['Tipo',f.tipo],['N° Cuotas',`${c} cuotas`]].map(([k,v])=>(<div key={k} className="ci-row"><div className="ci-k">{k}</div><div className="ci-v">{v}</div></div>))}
              </div>
              <div>
                {[['Garante',f.garante||'—'],['Tasa',f.tasaPct+'%'],['Desgravamen',fmt(d)],['G. Operativo',fmt(go)]].map(([k,v])=>(<div key={k} className="ci-row"><div className="ci-k">{k}</div><div className="ci-v">{v}</div></div>))}
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',borderBottom:'1px solid var(--border)'}}>
              <div style={{borderRight:'1px solid var(--border)'}}><div className="c-sum-lbl">CUOTA</div><div className="c-sum-box" style={{borderRight:'1px solid rgba(255,255,255,.12)'}}>{fmt(cota)}</div></div>
              <div><div className="c-sum-lbl">MONTO TOTAL</div><div className="c-sum-box">{fmt(total)}</div></div>
            </div>
            <div className="tbl-wrap"><table>
              <thead><tr><th>#</th><th>Fecha pago</th><th>Capital</th><th>Interés</th><th>Degrav.</th><th>G.Oper.</th><th>Cuota Base</th><th>TOTAL</th></tr></thead>
              <tbody>{prevRows.map(r=>(
                <tr key={r.n}>
                  <td style={{fontWeight:700,color:'var(--dark)',background:'var(--light)'}}>{r.n}</td>
                  <td style={{fontSize:12}}>{fmtD(r.fecha)}</td>
                  <td>{fmt(cap)}</td><td>{fmt(int)}</td><td>{fmt(d)}</td><td>{fmt(go)}</td>
                  <td style={{fontWeight:700,color:'var(--dark)',background:'var(--light)'}}>{fmt(cota)}</td>
                  <td style={{fontWeight:700,color:'var(--green)',background:'#dff2e8'}}>{fmt(cota)}</td>
                </tr>
              ))}</tbody>
              <tfoot><tr><td colSpan={7} style={{textAlign:'right',fontSize:11}}>MONTO TOTAL</td><td style={{color:'var(--green)'}}>{fmt(total)}</td></tr></tfoot>

/* ══ PRÉSTAMOS ══════════════════════════════════════════════════ */
function Prestamos({loans,sched,onDelete,onVer,onPagar}){
  const[q,setQ]=useState('');

  const cob=id=>sched.filter(r=>r.prestamo_id===id&&r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
  const sig=id=>sched.filter(r=>r.prestamo_id===id&&!['Pagado','Adelantado'].includes(getEst(r))).sort((a,b)=>a.n_cuota-b.n_cuota)[0];
  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div><div className="pg-ey">Portafolio</div><div className="pg-ti">Préstamos</div></div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,marginBottom:13,flexWrap:'wrap'}}>

        <tbody>
          {fl.length===0&&<tr><td colSpan={11} style={{textAlign:'center',padding:44,color:'var(--grey)'}}>No se encontraron préstamos</td></tr>}
          {fl.map(l=>{
            const cuotas=sched.filter(r=>r.prestamo_id===l.id);
            const est=getEstPrestamo(cuotas);
            const s2=sig(l.id);
            return<tr key={l.id}>
              <td style={{color:'#bbb',fontSize:11}}>#{l.id}</td>
              <td><div style={{fontWeight:600}}>{l.cliente}</div>{l.garante&&<div style={{fontSize:11,color:'var(--grey)'}}>Gar: {l.garante}</div>}</td>
              <td style={{fontWeight:700,color:'var(--dark)'}}>{fmt(l.monto)}</td>
              <td><span style={{fontSize:10.5,background:'var(--light)',color:'var(--dark)',borderRadius:4,padding:'3px 8px',fontWeight:700}}>{l.tipo}</span></td>
              <td style={{color:'var(--grey)'}}>{l.cuotas}</td>
              <td style={{fontWeight:600}}>{(N(l.tasa)*100).toFixed(1)}%</td>
              <td style={{color:'var(--grey)',fontSize:12}}>{fmtD(l.fecha_prestamo)}</td>
              <td style={{fontWeight:700,color:'var(--green)'}}>{fmt(cob(l.id))}</td>
              <td style={{fontSize:11,color:'var(--grey)'}}>{l.creado_por_email?.split('@')[0]||'—'}</td>
              <td><Badge s={est}/></td>
              <td><div style={{display:'flex',gap:6,alignItems:'center'}}>
                <button className="btn-ol btn-sm" onClick={()=>onVer(l)}>Ver</button>
                {s2&&<button className="btn btn-sm" onClick={()=>onPagar(s2)}>Pagar</button>}
                <button className="btn-del" onClick={()=>onDelete(l.id)}>×</button>
              </div></td>
            </tr>;
          })}
        </tbody>
      </table></div></div>
    </div>
  );
}

/* ══ REGISTRAR PAGO ═════════════════════════════════════════════ */
function RegistrarPago({loans,sched,payingRow,onPay,onPagarTodo}){
  const[selId,setSelId]=useState(payingRow?String(payingRow.prestamo_id):'');
  const[search,setSearch]=useState(payingRow?String(payingRow.prestamo_id):'');
  const[selRow,setSelRow]=useState(payingRow||null);
  const[monto,setMonto]=useState('');
  const[mora,setMora]=useState('');
  const[tipo,setTipo]=useState('NORMAL');
  const[fecha,setFecha]=useState(new Date().toISOString().split('T')[0]);
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState('');

  // Search by ID or client name
  const filtered=React.useMemo(()=>{
    const q=search.trim().toLowerCase();
    if(!q)return loans.slice(0,8);
    return loans.filter(l=>String(l.id)===q||l.cliente.toLowerCase().includes(q)).slice(0,10);
  },[loans,search]);

  const loan=loans.find(l=>l.id===Number(selId)||l.id===selId);
  const loanRows=loan?sched.filter(r=>r.prestamo_id===loan.id).sort((a,b)=>a.n_cuota-b.n_cuota):[];
  const pendientes=loanRows.filter(r=>!['Pagado','Adelantado'].includes(getEst(r)));

  function selectLoan(l){setSelId(String(l.id));setSearch(l.cliente+' (ID:'+l.id+')');setSelRow(null);setErr('');}

  async function pagar(){
    if(!selRow){setErr('Selecciona una cuota');return;}
    if(!monto||isNaN(Number(monto))){setErr('Ingresa el monto a pagar');return;}
    setSaving(true);setErr('');
    try{
      await onPay({row:selRow,monto:Number(monto),mora:Number(mora||0),tipo,fecha});
      setSelRow(null);setMonto('');setMora('');setTipo('NORMAL');
    }catch(ex){setErr(ex.message);}
    setSaving(false);
  }

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div><div className="pg-ey">Pagos</div><div className="pg-ti">Registrar pago</div><div className="pg-su">Busca por ID o nombre del cliente</div></div>

      {/* SEARCH BOX */}
      <div className="card" style={{marginBottom:13}}>
        <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Buscar préstamo</div></div>
        <div className="c-bd">
          <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:10}}>
            <div style={{position:'relative',flex:1,maxWidth:380}}>
              <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--grey)',pointerEvents:'none'}}>
                <svg viewBox="0 0 24 24" style={{width:14,height:14,stroke:'currentColor',fill:'none',strokeWidth:2,strokeLinecap:'round'}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </span>
              <input className="inp" placeholder="ID o nombre del cliente..." value={search} onChange={e=>{setSearch(e.target.value);setSelId('');}}
                style={{paddingLeft:34}} />
            </div>
            {selId&&<span style={{fontSize:12,color:'var(--teal)',fontWeight:600}}>Préstamo #{selId} seleccionado</span>}
          </div>
          {/* Results dropdown when searching */}
          {search.trim()&&!selId&&(
            <div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',maxWidth:480}}>
              {filtered.length===0&&<div style={{padding:'10px 14px',color:'var(--grey)',fontSize:13}}>Sin resultados</div>}
              {filtered.map(l=>{
                const est=getEstPrestamo(sched.filter(r=>r.prestamo_id===l.id));
                return<div key={l.id} onClick={()=>selectLoan(l)}
                  style={{padding:'9px 14px',cursor:'pointer',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--white)'}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--alt)'}
                  onMouseLeave={e=>e.currentTarget.style.background='var(--white)'}>
                  <div>
                    <span style={{fontWeight:700,color:'var(--dark)',marginRight:8}}>#{l.id}</span>
                    <span style={{fontWeight:600}}>{l.cliente}</span>
                    <span style={{color:'var(--grey)',fontSize:12,marginLeft:8}}>{fmt(l.monto)} · {l.tipo}</span>
                  </div>
                  <Badge s={est}/>
                </div>;
              })}
            </div>
          )}
        </div>
      </div>

      {/* CUOTAS TABLE */}
      {loan&&pendientes.length===0&&<div className="card" style={{padding:18,color:'var(--green)',fontWeight:600}}>✓ Todas las cuotas de {loan.cliente} están al día</div>}
      {loan&&pendientes.length>0&&(
        <div className="card" style={{marginBottom:13}}>
          <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Cuotas pendientes — {loan.cliente}</div></div>
          <div className="tbl-wrap"><table>
            <thead><tr><th>#</th><th>Fecha</th><th>Cuota base</th><th>Mora</th><th>Total</th><th>Estado</th><th></th></tr></thead>
            <tbody>{pendientes.map(r=>{
              const est=getEst(r);
              return<tr key={r.id} style={{background:selRow?.id===r.id?'#e8f5ee':undefined}}>
                <td style={{fontWeight:700,color:'var(--dark)'}}>{r.n_cuota}</td>
                <td style={{color:est==='Vencido'?'var(--red)':undefined,fontWeight:est==='Vencido'?600:undefined,fontSize:12}}>{fmtD(r.fecha_vence)}</td>
                <td>{fmt(r.cuota_base)}</td>
                <td style={{color:'var(--red)'}}>{r.mora?fmt(r.mora):''}</td>
                <td style={{fontWeight:700}}>{fmt(N(r.cuota_base)+N(r.mora||0))}</td>
                <td><Badge s={est}/></td>
                <td><button className="btn btn-sm" onClick={()=>{setSelRow(r);setMonto(String(N(r.cuota_base)+N(r.mora||0)));setTipo('NORMAL');}}>Seleccionar</button></td>
              </tr>;
            })}</tbody>
          </table></div>
        </div>
      )}

      {/* PAYMENT FORM */}
      {selRow&&(
        <div className="card">
          <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Registrar pago — Cuota {selRow.n_cuota} · {loan?.cliente}</div></div>
          <div className="c-bd" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div>
              <span className="lbl">Monto a pagar *</span>
              <input className="inp" type="number" value={monto} onChange={e=>setMonto(e.target.value)} placeholder="0.00"/>
            </div>
            <div>
              <span className="lbl">Mora (S/.)</span>
              <input className="inp" type="number" value={mora} onChange={e=>setMora(e.target.value)} placeholder="0.00"/>
            </div>
            <div>
              <span className="lbl">Tipo de pago</span>
              <select className="inp" value={tipo} onChange={e=>setTipo(e.target.value)}>
                {['NORMAL','PARCIAL','SOLO INTERES','PAGO ADELANTADO','CANCELAR PRÉSTAMO'].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <span className="lbl">Fecha de pago</span>
              <input className="inp" type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
            </div>
          </div>
          {err&&<div style={{padding:'8px 18px',color:'var(--red)',fontSize:13,fontWeight:600}}>{err}</div>}
          <div className="c-bd" style={{paddingTop:0,display:'flex',gap:10}}>
            <button className="btn" disabled={saving} onClick={pagar}>{saving?'Guardando...':'Registrar pago'}</button>
            <button className="btn-ol" onClick={()=>{setSelRow(null);setMonto('');setMora('');}}>Cancelar</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══ EXPORTAR EXCEL ════════════════════════════════════════════ */
function ExportarExcel({loans,sched}){
  function exportar(){
    if(!window.XLSX){alert('XLSX no disponible');return;}
    const XL=window.XLSX;
    const wb=XL.utils.book_new();

    // Construir datos
    const rows=loans.map(l=>{
      const cuotas=sched.filter(r=>r.prestamo_id===l.id);
      const est=getEstPrestamo(cuotas);
      const cobrado=cuotas.filter(r=>r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
      const saldo=cuotas.reduce((a,r)=>a+getSaldo(r),0);
      const mora=cuotas.reduce((a,r)=>a+N(r.mora||0),0);
      return[l.id,l.cliente,l.garante||'',l.referencia||'',l.cliente_externo||'NO',
        N(l.monto),parseFloat((N(l.tasa)*100).toFixed(2)),l.tipo,l.cuotas,
        fmtD(l.fecha_prestamo),N(l.desgravamen||0),N(l.gasto_operativo||0),
        parseFloat(cobrado.toFixed(2)),parseFloat(saldo.toFixed(2)),parseFloat(mora.toFixed(2)),
        est,l.creado_por_email||''];
    });

    const headers=['ID','Cliente','Garante','Referido por','Cliente externo',
      'Monto (S/.)','Tasa %','Tipo','N° Cuotas','Fecha préstamo',
      'Desgravamen','G. Operativo','Total cobrado','Saldo pendiente','Mora',
      'Estado','Registrado por'];

    const ws=XL.utils.aoa_to_sheet([headers,...rows]);

    // Anchos de columna
    ws['!cols']=[{wch:5},{wch:22},{wch:18},{wch:18},{wch:13},{wch:11},{wch:7},{wch:10},{wch:9},{wch:14},{wch:12},{wch:11},{wch:13},{wch:14},{wch:8},{wch:11},{wch:24}];

    // Estilos de cabecera (fondo oscuro, texto blanco, negrita)
    const headerStyle={font:{bold:true,color:{rgb:'FFFFFF'},sz:11},fill:{fgColor:{rgb:'1A1A2E'}},alignment:{horizontal:'center',vertical:'center'},border:{bottom:{style:'medium',color:{rgb:'C9A84C'}}}};
    headers.forEach((_,ci)=>{
      const ref=XL.utils.encode_cell({r:0,c:ci});
      if(!ws[ref])ws[ref]={t:'s',v:headers[ci]};
      ws[ref].s=headerStyle;
    });

    // Estilos por fila — alternar + color estado
    const estColors={'ACTIVO':'D1FAE5','EN CURSO':'DBEAFE','VENCIDO':'FEE2E2','CANCELADO':'F3F4F6'};
    const estText={'ACTIVO':'065F46','EN CURSO':'1E40AF','VENCIDO':'991B1B','CANCELADO':'6B7280'};
    rows.forEach((row,ri)=>{
      const bg=ri%2===0?'FFFFFF':'F8F8FC';
      row.forEach((_,ci)=>{
        const ref=XL.utils.encode_cell({r:ri+1,c:ci});
        if(!ws[ref])return;
        const isEst=ci===15;
        const estVal=row[15];
        ws[ref].s={
          fill:{fgColor:{rgb:isEst?(estColors[estVal]||'F3F4F6'):bg}},
          font:{sz:10,bold:ci===1||ci===5,color:{rgb:isEst?(estText[estVal]||'374151'):(ci===1?'1A1A2E':'374151')}},
          alignment:{horizontal:typeof row[ci]==='number'?'right':(ci===0?'center':'left'),vertical:'center'},
          border:{bottom:{style:'thin',color:{rgb:'E5E7EB'}}}
        };
      });
    });

    // Fila de totales al final
    const totMonto=rows.reduce((a,r)=>a+r[5],0);
    const totCob=rows.reduce((a,r)=>a+r[12],0);
    const totSaldo=rows.reduce((a,r)=>a+r[13],0);
    const totMora=rows.reduce((a,r)=>a+r[14],0);
    const totRow=['','TOTALES','','','',
      parseFloat(totMonto.toFixed(2)),'','','','','','',
      parseFloat(totCob.toFixed(2)),parseFloat(totSaldo.toFixed(2)),parseFloat(totMora.toFixed(2)),'',''];
    XL.utils.sheet_add_aoa(ws,[totRow],{origin:-1});
    const lastR=rows.length+1;
    totRow.forEach((_,ci)=>{
      const ref=XL.utils.encode_cell({r:lastR,c:ci});
      if(!ws[ref])return;
      ws[ref].s={fill:{fgColor:{rgb:'1A1A2E'}},font:{bold:true,color:{rgb:'C9A84C'},sz:10},alignment:{horizontal:typeof totRow[ci]==='number'?'right':(ci===1?'left':'center'),vertical:'center'}};
    });

    ws['!rows']=[{hpt:22},...rows.map(()=>({hpt:18})),{hpt:20}];

    XL.utils.book_append_sheet(wb,ws,'Préstamos');
    const fecha=new Date().toISOString().split('T')[0];
    XL.writeFile(wb,'CreditoSanJuan_'+fecha+'.xlsx');
  }

  const totPres=loans.reduce((a,l)=>a+N(l.monto),0);
  const totCob=sched.filter(r=>r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
  const totSaldo=sched.reduce((a,r)=>a+getSaldo(r),0);
  const totMora=sched.reduce((a,r)=>a+N(r.mora||0),0);

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div><div className="pg-ey">Reportes</div><div className="pg-ti">Exportar a Excel</div><div className="pg-su">Descarga toda la base de datos en un archivo Excel con 3 hojas: préstamos, cronograma y resumen por cliente.</div></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:11,marginBottom:20}}>
        {[
          {l:'Préstamos registrados',v:loans.length,suf:'préstamos',c:'var(--dark)',bg:'var(--light)',bar:'var(--dark)'},
          {l:'Total cuotas',v:sched.length,suf:'cuotas',c:'var(--teal)',bg:'#e4f4f0',bar:'var(--teal2)'},
          {l:'Capital total',v:fmt(totPres),c:'var(--dark)',bg:'var(--light)',bar:'var(--dark)'},
          {l:'Total cobrado',v:fmt(totCob),c:'var(--green)',bg:'#dff2e8',bar:'var(--green)'},
          {l:'Saldo pendiente',v:fmt(totSaldo),c:'#a0620a',bg:'#fef3e2',bar:'#d97706'},
          {l:'Mora acumulada',v:fmt(totMora),c:'var(--red)',bg:'#fde8e8',bar:'var(--red)'},
        ].map((k,i)=>(
          <div key={i} className="kpi" style={{position:'relative',overflow:'hidden'}}>
            <div className="kpi-bar" style={{background:k.bar,position:'absolute',top:0,left:0,right:0,height:3}}/>
            <div className="kpi-val" style={{color:k.c,fontSize:18,marginTop:8}}>{k.v}</div>
            <div className="kpi-lbl">{k.l}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Contenido del archivo</div></div>
        <div className="c-bd">
          <div style={{display:'grid',gap:12,marginBottom:22}}>
            {[
              {icon:'📋',title:'Hoja 1 — Préstamos',desc:'Todos los préstamos con cliente, garante, referido por, monto, tasa, tipo, estado, cobrado y más.'},
              {icon:'📅',title:'Hoja 2 — Cronograma completo',desc:'Cada cuota de cada préstamo con fechas, montos, pagos realizados, mora y saldo.'},
              {icon:'👥',title:'Hoja 3 — Resumen por cliente',desc:'Consolidado por cliente: cuántos préstamos tiene, total prestado, cobrado y saldo pendiente.'},
            ].map((h,i)=>(
              <div key={i} style={{display:'flex',gap:14,padding:'13px 16px',background:'var(--alt)',borderRadius:9,border:'1px solid var(--border)'}}>
                <span style={{fontSize:22,flexShrink:0}}>{h.icon}</span>
                <div><div style={{fontWeight:700,color:'var(--ink)',marginBottom:3,fontSize:13}}>{h.title}</div><div style={{fontSize:12.5,color:'var(--grey)'}}>{h.desc}</div></div>
              </div>
            ))}
          </div>
          <button className="btn" style={{padding:'13px 32px',fontSize:14,display:'flex',alignItems:'center',gap:9}} onClick={exportar}>
            <svg viewBox="0 0 24 24" style={{width:16,height:16,stroke:'currentColor',fill:'none',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'}}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Descargar Excel — {loans.length} préstamos
          </button>
          {loans.length===0&&<div style={{marginTop:10,fontSize:12.5,color:'var(--grey)'}}>No hay datos aún — registra préstamos primero.</div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
